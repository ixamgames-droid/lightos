[pytest]
# ── Test-Gate-Absicherung (pytest-timeout) ──────────────────────────────────
# Die Voll-Suite hatte einen NICHTDETERMINISTISCHEN Random-Haenger: 0 echte
# Failures, aber der Lauf blieb zufaellig an wechselnder Stelle (84/68/97 %)
# stehen und terminierte nie (Qt/native Teardown-Race, headless). Da die
# Test-Reihenfolge deterministisch ist, die Haenger-Stelle aber wandert, ist die
# Ursache KEIN einzelner Test, sondern akkumulierender nativer Zustand, der
# gelegentlich beim Teardown deadlockt.
#
# Watchdog: Ein Test, der laenger als `timeout` Sekunden blockiert, wird mit
# einem vollstaendigen Thread-Stack-Dump GEMELDET und der Lauf terminiert
# (statt ewig einzufrieren) -> der Verursacher wird beim naechsten Lauf
# namentlich sichtbar. `thread`-Methode, weil signal/SIGALRM auf Windows fehlt.
#
# Bewusst als dedizierte ini-Keys (NICHT in addopts): tools/verify_loop.ps1
# ruft pytest mit `-o addopts=""` auf und wuerde addopts-Flags wegwerfen — die
# timeout-Keys ueberleben das und gelten so fuer Gate-Skript UND `pytest tests/`.
timeout = 60
timeout_method = thread
