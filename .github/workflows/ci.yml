name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Qt/GUI-Abhaengigkeiten werden fuer headless Tests nicht benoetigt.
      # Nur die reinen Python-Kern-Pakete installieren.
      - name: Kern-Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install SQLAlchemy>=2.0.0 numpy>=1.26.0 mido>=1.3.0

      - name: Unit-Tests ausfuehren
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/test_show_file.py tests/test_core_engine.py -v --tb=short

      - name: Test-Ergebnis zusammenfassen
        if: always()
        run: |
          python -m pytest tests/test_show_file.py tests/test_core_engine.py --tb=no -q
