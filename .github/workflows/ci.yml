name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Kern-Pakete + PySide6 (offscreen) fuer den headless View-Smoke (QA-11):
      # test_views.py baut echte Qt-Views (VC/SimpleDesk/EFX/Matrix), damit eine
      # kaputte committete View auch auf GitHub auffaellt (nicht nur lokal).
      - name: Kern-Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # pytest-timeout: ohne das Plugin sind die timeout-Keys aus pytest.ini
          # wirkungslos -> der Watchdog ist in CI still deaktiviert und ein
          # haengender Test blockiert den Lauf bis zum Job-Timeout (QA-01).
          pip install pytest pytest-timeout
          pip install SQLAlchemy>=2.0.0 numpy>=1.26.0 mido>=1.3.0 pyserial>=3.5
          # PySide6 (+ Addons, wie requirements.txt) fuer den View-Smoke.
          pip install "PySide6>=6.7.0" "PySide6-Addons>=6.7.0"

      # QA-11: zusaetzlich Show-Lint (kaputte committete Show) + View-Smoke.
      # Ein absichtlich kaputter param_key in einer Test-Show bzw. eine nicht mehr
      # baubare View laesst CI jetzt rot werden.
      - name: Unit-Tests ausfuehren
        env:
          QT_QPA_PLATFORM: offscreen
          # test_views.py baut echte Qt-Views (+ MIDI-Threads); der FINALE native
          # Interpreter-Exit crasht auf Windows/Py3.11/PySide6 6.11 sporadisch mit
          # STATUS_HEAP_CORRUPTION NACH bestandenen Tests -> falsch-rotes CI. Nach
          # dem echten Ergebnis mit os._exit(exitstatus) beenden (conftest.py).
          LIGHTOS_HARDEN_EXIT_ALL: "1"
        run: |
          python -m pytest tests/test_show_file.py tests/test_core_engine.py tests/test_show_lint.py tests/test_views.py -v --tb=short

      - name: Test-Ergebnis zusammenfassen
        if: always()
        env:
          QT_QPA_PLATFORM: offscreen
          LIGHTOS_HARDEN_EXIT_ALL: "1"   # s. o. — flaky nativer Teardown-Crash (Py3.11)
        run: |
          python -m pytest tests/test_show_file.py tests/test_core_engine.py tests/test_show_lint.py tests/test_views.py --tb=no -q
