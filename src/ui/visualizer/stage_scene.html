function buildFixtureModel(type) {
  switch (type) {
    case 'moving_head': return buildMovingHead();
    case 'par':         return buildPar();
    case 'led_bar':     return buildLedBar();
    case 'strobe':      return buildStrobe();
    case 'dimmer':      return buildDimmer();
    default:            return buildPar();
  }
}

// 2D top-down icon
function buildTopDownIcon(type) {
  const group = new THREE.Group();
  const matLine = new THREE.LineBasicMaterial({ color: 0xcccccc });
  let body, ring;
  if (type === 'moving_head') {
    // circle + arrow
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.6, 24),
      new THREE.MeshBasicMaterial({ color: 0x2a4060, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    const arrowPts = [
      new THREE.Vector3(0, 0.05, 0),
      new THREE.Vector3(0, 0.05, -0.7),
    ];
    const arrowGeo = new THREE.BufferGeometry().setFromPoints(arrowPts);
    const arrow = new THREE.Line(arrowGeo, matLine);
    group.add(arrow);
    const tipPts = [
      new THREE.Vector3(-0.15, 0.05, -0.5),
      new THREE.Vector3(0, 0.05, -0.7),
      new THREE.Vector3(0.15, 0.05, -0.5),
    ];
    const tipGeo = new THREE.BufferGeometry().setFromPoints(tipPts);
    const tip = new THREE.Line(tipGeo, matLine);
    group.add(tip);
  } else if (type === 'par') {
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.55, 24),
      new THREE.MeshBasicMaterial({ color: 0x404040, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  } else if (type === 'led_bar') {
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(1.6, 0.4),
      new THREE.MeshBasicMaterial({ color: 0x303030, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  } else if (type === 'strobe') {
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, 0.8),
      new THREE.MeshBasicMaterial({ color: 0x505050, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // X cross
    const xpts = [
      new THREE.Vector3(-0.35, 0.05, -0.35), new THREE.Vector3(0.35, 0.05, 0.35),
      new THREE.Vector3(-0.35, 0.05, 0.35), new THREE.Vector3(0.35, 0.05, -0.35),
    ];
    const xGeo = new THREE.BufferGeometry().setFromPoints(xpts);
    const xLine = new THREE.LineSegments(xGeo, matLine);
    group.add(xLine);
  } else {
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.45, 16),
      new THREE.MeshBasicMaterial({ color: 0x606060, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  }
  // Outline ring
  ring = new THREE.Mesh(
    new THREE.RingGeometry(0.62, 0.72, 24),
    new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.0, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.03;
  group.add(ring);
  group.userData.body = body;
  group.userData.ring = ring;
  // Force-pickable via tag
  body.userData.isTopDownIcon = true;
  body.userData.isFixtureMesh = true;
  return group;
}

// ── Beam helpers ─────────────────────────────────────────────────────────────
function createBeamCone(color, intensity, angle, length) {
  const radius = Math.tan(angle) * length;
  const geo = new THREE.ConeGeometry(radius, length, 24, 1, true);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: Math.max(0.02, intensity * settings.beamOpacity),
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const cone = new THREE.Mesh(geo, mat);
  cone.position.y = -length / 2;
  cone.visible = settings.showCones;
  return cone;
}

function createFloorSpot(color, intensity, radius) {
  const geo = new THREE.CircleGeometry(radius, 32);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: Math.max(0.0, intensity * 0.55),
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const disc = new THREE.Mesh(geo, mat);
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = 0.01;
  disc.visible = settings.showFloorSpots;
  return disc;
}

function addFixture(data) {
  const fid = data.fid;
  if (fixtures[fid]) removeFixture(fid);
  const model = buildFixtureModel(data.type || 'par');
  const root = new THREE.Group();
  root.position.set(data.x || 0, data.y == null ? 6.5 : data.y, data.z || 0);
  root.add(model.group);

  const headHost = model.head || model.group;
  const color = new THREE.Color((data.r||0)/255, (data.g||0)/255, (data.b||0)/255);
  const intensity = (data.intensity||0) / 255;
  const beamLength = data.type === 'led_bar' ? 6.0 : 8.0;
  const beamAngle = data.type === 'led_bar' ? Math.PI/14 : Math.PI/10;
  const beam = createBeamCone(color, intensity, beamAngle, beamLength);
  headHost.add(beam);

  const spot = new THREE.SpotLight(color, intensity * 3.0, 25, beamAngle * 1.2, 0.6, 1.0);
  spot.castShadow = true;
  spot.shadow.mapSize.width = 512;
  spot.shadow.mapSize.height = 512;
  root.add(spot);

  const spotTarget = new THREE.Object3D();
  spotTarget.position.set(0, -root.position.y, 0);
  scene.add(spotTarget);
  spot.target = spotTarget;

  const floorSpot = createFloorSpot(color, intensity, 1.2);
  scene.add(floorSpot);

  scene.add(root);

  // 2D top-down icon
  const icon = buildTopDownIcon(data.type || 'par');
  icon.position.set(root.position.x, 0.05, root.position.z);
  icon.userData.fid = Number(fid);
  // Force pickable: tag children
  icon.traverse(o => { if (o.isMesh) o.userData.fid = Number(fid); });
  icon.visible = (viewMode === '2D');
  scene.add(icon);
  topDownIcons[fid] = icon;

  // Hide 3D model in 2D mode
  root.visible = (viewMode === '3D');

  fixtures[fid] = {
    group: root,
    yoke: model.yoke || null,
    head: model.head || null,
    lens: model.lens || null,
    lamp: model.lamp || null,
    beam, spot, spotTarget, floorSpot,
    icon,
    type: data.type || 'par',
    data: { ...data },
  };

  rebuildFixtureMeshList();
  updateFixture(fid, data.r||0, data.g||0, data.b||0, data.intensity||0, data.pan||128, data.tilt||128);
}

function removeFixture(fid) {
  const f = fixtures[fid];
  if (!f) return;
  scene.remove(f.group);
  if (f.spotTarget) scene.remove(f.spotTarget);
  if (f.floorSpot) { scene.remove(f.floorSpot); disposeObj(f.floorSpot); }
  if (f.icon) { scene.remove(f.icon); f.icon.traverse(disposeObj); }
  f.group.traverse(disposeObj);
  delete fixtures[fid];
  delete topDownIcons[fid];
  // Clean selection
  const idx = selectedFids.indexOf(Number(fid));
  if (idx >= 0) selectedFids.splice(idx, 1);
  rebuildFixtureMeshList();
  updateOutlines();
}

function updateFixture(fid, r, g, b, intensity, pan, tilt) {
  const f = fixtures[fid];
  if (!f) return;
  const color = new THREE.Color(r/255, g/255, b/255);
  const intNorm = intensity / 255;
  const skipBeam = (viewMode === '2D' && Object.keys(fixtures).length > 50);

  if (f.beam) {
    f.beam.material.color = color;
    f.beam.material.opacity = Math.max(0.0, intNorm * settings.beamOpacity);
    f.beam.visible = settings.showCones && intNorm > 0.01 && viewMode === '3D';
  }
  if (f.spot) {
    f.spot.color = color;
    f.spot.intensity = intNorm * 3.0;
  }
  if (f.floorSpot) {
    f.floorSpot.material.color = color;
    f.floorSpot.material.opacity = Math.max(0.0, intNorm * 0.55);
    f.floorSpot.visible = settings.showFloorSpots && intNorm > 0.01;
  }
  if (f.lens && f.lens.material) {
    f.lens.material.emissive = color;
    f.lens.material.emissiveIntensity = intNorm * 1.5;
  }
  if (f.lamp && f.lamp.material) {
    f.lamp.material.emissive = color;
    f.lamp.material.emissiveIntensity = intNorm * 1.5;
  }
  // Top-down icon color reflects active output color (only when bright)
  if (f.icon && f.icon.userData.body && f.icon.userData.body.material) {
    if (intNorm > 0.05) {
      f.icon.userData.body.material.color.copy(color);
      f.icon.userData.body.material.opacity = Math.min(1.0, 0.5 + intNorm * 0.5);
    } else {
      f.icon.userData.body.material.color.setHex(0x3a3a4a);
      f.icon.userData.body.material.opacity = 0.85;
    }
  }

  // Pan/Tilt
  if (f.type === 'moving_head' && f.yoke && f.head) {
    const panRad = ((pan - 128) / 128) * Math.PI;
    const tiltRad = ((tilt - 128) / 128) * (Math.PI / 2);
    f.yoke.rotation.y = panRad;
    f.head.rotation.x = tiltRad;
    // Reflect pan in top-down icon (rotate the whole icon)
    if (f.icon) f.icon.rotation.y = panRad + f.group.rotation.y;
  }

  // Floor spot follow direction
  if (!skipBeam && f.floorSpot && f.spotTarget) {
    const dir = new THREE.Vector3(0, -1, 0);
    if (f.type === 'moving_head') {
      f.head.updateMatrixWorld();
      const wq = new THREE.Quaternion();
      f.head.getWorldQuaternion(wq);
      dir.applyQuaternion(wq);
    }
    const origin = new THREE.Vector3();
    f.group.getWorldPosition(origin);
    if (Math.abs(dir.y) > 0.001) {
      const t = -origin.y / dir.y;
      if (t > 0 && t < 100) {
        const hitX = origin.x + dir.x * t;
        const hitZ = origin.z + dir.z * t;
        f.floorSpot.position.set(hitX, 0.01, hitZ);
        f.spotTarget.position.set(hitX, 0.0, hitZ);
      }
    }
  }
  // Keep top-down icon position synced
  if (f.icon) {
    f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
  }
}

// ============================================================================
// View mode 2D / 3D
// ============================================================================
function setViewMode(mode) {
  viewMode = (mode === '2D') ? '2D' : '3D';
  activeCam = (viewMode === '2D') ? orthoCam : perspectiveCam;
  document.getElementById('mode-text').textContent = (viewMode === '2D') ? '2D Top View' : '3D View';
  document.getElementById('ruler-info').style.display = (viewMode === '2D') ? 'block' : 'none';
  // Toggle fixtures visibility
  for (const fid in fixtures) {
    const f = fixtures[fid];
    f.group.visible = (viewMode === '3D');
    if (f.icon) f.icon.visible = (viewMode === '2D');
    // Hide beam cones in 2D
    if (f.beam) f.beam.visible = (viewMode === '3D') && settings.showCones && f.beam.material.opacity > 0.01;
  }
  // Hide preset 3D scenery in 2D top-down to reduce clutter
  presetObjects.forEach(o => {
    if (o.userData && o.userData.isFloor) return;
    o.visible = (viewMode === '3D');
  });
  if (floorMesh) floorMesh.visible = true;
  // Resize ortho on mode switch (preserve aspect)
  resizeOrtho();
  // Resize-Handles neu generieren (Groesse haengt vom Viewmode ab)
  updateResizeHandles();
}

let _userBrightnessOverride = null;  // wenn Slider manuell gesetzt

function setEditMode(mode) {
  editMode = mode || 'view';
  const banner = document.getElementById('mode-banner');
  if (editMode === 'edit') {
    banner.textContent = 'FIXTURE EDIT – Ziehen=Bewegen | Rechtsklick/Lang-Drücken=Platzieren | 📌 Taste unten rechts';
    banner.style.display = 'block';
  } else if (editMode === 'stage') {
    banner.textContent = 'BÜHNE BEARBEITEN – Tippen=Auswählen | Ziehen=Verschieben | ↻ / 🗑 unten rechts';
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
  updateFABs();
  // Auto-Brightness: edit/stage modes brighten the scene for visibility
  if (settings.autoBrightness && _userBrightnessOverride === null) {
    if (editMode === 'edit' || editMode === 'stage') {
      applyBrightness(0.65);
    } else {
      applyBrightness(0.20);
    }
    // Inform Python so UI slider reflects current value
    if (typeof bridge !== 'undefined' && bridge && bridge.brightnessChanged) {
      try { bridge.brightnessChanged(settings.brightness); } catch (e) {}
    }
  }
  // Clear selection on mode change
  selectedFids = [];
  selectedStageId = null;
  updateOutlines();
}

// Direkter Slider-Setter (von Python aufgerufen) - markiert User-Override
function setBrightnessManual(b) {
  _userBrightnessOverride = b;
  applyBrightness(b);
}

// Reset auto-brightness (User klickt "Auto")
function resetBrightnessAuto() {
  _userBrightnessOverride = null;
  // Trigger current edit mode brightness
  setEditMode(editMode);
}

function resizeOrtho() {
  const a = window.innerWidth / window.innerHeight;
  orthoCam.left = -orthoSize * a;
  orthoCam.right = orthoSize * a;
  orthoCam.top = orthoSize;
  orthoCam.bottom = -orthoSize;
  orthoCam.updateProjectionMatrix();
}

// ============================================================================
// Selection / outlines
// ============================================================================
let selectedFids = []; // fid numbers
let selectedStageId = null;

// Apply an emissive RGB (0..1) to a mesh or all child meshes of a Group.
function applyStageEmissive(target, r, g, b) {
  if (!target) return;
  if (target.isMesh) {
    if (target.material && target.material.emissive) {
      target.material.emissive.setRGB(r, g, b);
    }
  } else if (target.isGroup || target.children) {
    target.traverse(c => {
      if (c.isMesh && c.material && c.material.emissive) {
        c.material.emissive.setRGB(r, g, b);
      }
    });
  }
}

function updateOutlines() {
  // Fixture outlines: tint icon ring in 2D, otherwise fall back to a wireframe-like hue
  for (const fid in fixtures) {
    const f = fixtures[fid];
    const sel = selectedFids.includes(Number(fid));
    if (f.icon && f.icon.userData.ring && f.icon.userData.ring.material) {
      f.icon.userData.ring.material.opacity = sel ? 1.0 : 0.0;
    }
    // 3D selection: brighten lens emissive a bit when no DMX intensity
    if (f.lens && f.lens.material) {
      if (sel) {
        // ensure visible cue
        if (!f._selBorder) {
          const geo = new THREE.RingGeometry(0.4, 0.55, 24);
          const mat = new THREE.MeshBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
          const ring = new THREE.Mesh(geo, mat);
          ring.rotation.x = -Math.PI / 2;
          ring.position.y = -0.5;
          f.group.add(ring);
          f._selBorder = ring;
        }
        f._selBorder.visible = true;
      } else if (f._selBorder) {
        f._selBorder.visible = false;
      }
    }
  }
  // Stage object highlight: selektiertes Element gelb (sehr auffaellig), andere unmarkiert
  for (const id in stageObjects) {
    const so = stageObjects[id];
    if (id === selectedStageId) {
      // BoxHelper in hellgelb mit dicker Linie
      if (!so._helper) {
        so._helper = new THREE.BoxHelper(so.mesh, 0xffd700);
        if (so._helper.material) {
          so._helper.material.linewidth = 4;
          so._helper.material.depthTest = false;
          so._helper.material.transparent = true;
          so._helper.material.opacity = 1.0;
        }
        scene.add(so._helper);
      } else {
        so._helper.material.color.setHex(0xffd700);
        so._helper.material.opacity = 1.0;
      }
      so._helper.update();
      so._helper.visible = true;
      // Labels ueber Elementen wurden auf Wunsch entfernt (stoeren) - nichts tun
      // Emissive-Boost als Start-Wert (animate() pulsiert weiter)
      applyStageEmissive(so.mesh, 0.4, 0.25, 0.0);
    } else {
      if (so._helper) so._helper.visible = false;
      // Emissive zuruecksetzen
      applyStageEmissive(so.mesh, 0, 0, 0);
    }
  }
  // Resize-Handles neu aufbauen (nur sichtbar wenn editMode == 'stage' + Selektion)
  updateResizeHandles();
  // Top-Banner: zeige welche Art von Element selektiert ist
  const sb = document.getElementById('selection-banner');
  const sbt = document.getElementById('selection-banner-text');
  if (sb && sbt) {
    if (selectedStageId && stageObjects[selectedStageId]) {
      const so = stageObjects[selectedStageId];
      const typeLabels = {
        platform: 'PLATTFORM', truss_h: 'TRASSE (horizontal)', truss_v: 'TRASSE (vertikal)',
        wall: 'WAND', led_wall: 'LED-WAND', speaker: 'LAUTSPRECHER',
        audience: 'PUBLIKUM', dj_booth: 'DJ-BOOTH'
      };
      const nm = so.data.name || '';
      const tp = typeLabels[so.data.type] || String(so.data.type || '').toUpperCase();
      sbt.textContent = nm ? (tp + ' - ' + nm) : tp;
      sb.style.display = 'block';
    } else if (selectedFids.length > 0) {
      sbt.textContent = 'FIXTURE x' + selectedFids.length;
      sb.style.display = 'block';
    } else {
      sb.style.display = 'none';
    }
  }
  // Notify python of selection
  if (bridge && bridge.fixtureSelectionChanged) {
    try { bridge.fixtureSelectionChanged(JSON.stringify(selectedFids)); } catch (e) {}
  }
  if (bridge && bridge.stageSelectionChanged) {
    try { bridge.stageSelectionChanged(selectedStageId || ''); } catch (e) {}
  }
  updateFABs();
}

// ============================================================================
// Pointer / drag / select
// ============================================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let isLeftDragging = false;
let dragMode = 'none';  // 'rotate' | 'pan' | 'fixtureDrag' | 'stageDrag' | 'marquee' | 'none'
let lastMouseX = 0, lastMouseY = 0;
let downMouseX = 0, downMouseY = 0;
let mouseMovedDuringClick = false;

let dragStartPositions = {}; // fid -> {x, z}
let dragStartStagePos = null; // for stage drag
let dragGroundOffset = new THREE.Vector3();

function setMouseFromCoords(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
}

function setMouseFromEvent(e) {
  setMouseFromCoords(e.clientX, e.clientY);
}

function intersectGround() {
  raycaster.setFromCamera(mouse, activeCam);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const out = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, out);
  return out;
}

function pickFixture() {
  raycaster.setFromCamera(mouse, activeCam);
  // For 2D mode prefer the top-down icons (their body meshes are in fixtureMeshes? No, we rebuild only on add/remove - icons aren't in that list. Build dynamic list here.)
  const meshes = [];
  if (viewMode === '2D') {
    for (const fid in topDownIcons) {
      topDownIcons[fid].traverse(o => { if (o.isMesh) { o.userData.fid = Number(fid); meshes.push(o); } });
    }
  } else {
    for (const fid in fixtures) {
      fixtures[fid].group.traverse(o => { if (o.isMesh) { o.userData.fid = Number(fid); meshes.push(o); } });
    }
  }
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length > 0) return hits[0].object.userData.fid;
  return null;
}

function pickStageObject() {
  raycaster.setFromCamera(mouse, activeCam);
  const meshes = Object.values(stageObjects).map(s => s.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) return hits[0].object.userData.stageId;
  return null;
}

function snap(v) {
  if (!settings.snapToGrid) return v;
  return Math.round(v / settings.gridStep) * settings.gridStep;
}

function _placeFixtureAtMouse() {
  raycaster.setFromCamera(mouse, activeCam);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0), -0.4), target);
  if (bridge && target && bridge.placeFixture) {
    _fabLastPlaceCoords = { x: target.x, z: target.z };
    bridge.placeFixture(JSON.stringify({ x: snap(target.x), y: 6.5, z: snap(target.z) }));
  }
}

renderer.domElement.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  setMouseFromEvent(e);
  _placeFixtureAtMouse();
}, false);

// Shared pointer logic (called by both mouse and touch handlers)
function handlePointerDown(clientX, clientY, shiftKey) {
  setMouseFromCoords(clientX, clientY);
  isLeftDragging = true;
  downMouseX = clientX; downMouseY = clientY;
  lastMouseX = clientX; lastMouseY = clientY;
  mouseMovedDuringClick = false;

  if (editMode === 'edit') {
    const fid = pickFixture();
    if (fid != null) {
      const additive = shiftKey;
      if (!additive && !selectedFids.includes(fid)) {
        selectedFids = [fid];
      } else if (additive) {
        if (!selectedFids.includes(fid)) selectedFids.push(fid);
      }
      dragStartPositions = {};
      for (const sf of selectedFids) {
        if (fixtures[sf]) {
          dragStartPositions[sf] = {
            x: fixtures[sf].group.position.x,
            z: fixtures[sf].group.position.z,
          };
        }
      }
      const groundHit = intersectGround();
      const refF = fixtures[fid];
      if (groundHit && refF) {
        dragGroundOffset.set(groundHit.x - refF.group.position.x, 0, groundHit.z - refF.group.position.z);
        dragGroundOffset.userData = { refFid: fid };
      }
      dragMode = 'fixtureDrag';
      updateOutlines();
      return;
    } else {
      // Marquee-Selektion (nur mit Maus; Touch springt direkt zu Kamera-Pan)
      dragMode = 'marquee';
      const m = document.getElementById('marquee');
      m.style.display = 'block';
      m.style.left = clientX + 'px';
      m.style.top = clientY + 'px';
      m.style.width = '0px';
      m.style.height = '0px';
      if (!shiftKey) { selectedFids = []; updateOutlines(); }
      return;
    }
  }

  if (editMode === 'stage') {
    if (selectedStageId && resizeHandles.length > 0) {
      const handle = pickResizeHandle();
      if (handle) {
        const so = stageObjects[selectedStageId];
        if (so) {
          dragResizeCorner = handle.userData.corner;
          const halfX = so.data.size.x / 2;
          const halfZ = so.data.size.z / 2;
          const cx = so.mesh.position.x;
          const cz = so.mesh.position.z;
          let fixedX, fixedZ;
          if (dragResizeCorner === 'nw') { fixedX = cx + halfX; fixedZ = cz + halfZ; }
          else if (dragResizeCorner === 'ne') { fixedX = cx - halfX; fixedZ = cz + halfZ; }
          else if (dragResizeCorner === 'sw') { fixedX = cx + halfX; fixedZ = cz - halfZ; }
          else                                { fixedX = cx - halfX; fixedZ = cz - halfZ; }
          dragResizeStart = {
            fixedX, fixedZ,
            startSizeX: so.data.size.x,
            startSizeZ: so.data.size.z,
          };
          dragMode = 'stageResize';
          return;
        }
      }
    }
    const sid = pickStageObject();
    if (sid != null) {
      selectedStageId = sid;
      const so = stageObjects[sid];
      const groundHit = intersectGround();
      if (groundHit) {
        dragStartStagePos = {
          startX: so.mesh.position.x,
          startZ: so.mesh.position.z,
          offsetX: groundHit.x - so.mesh.position.x,
          offsetZ: groundHit.z - so.mesh.position.z,
        };
      }
      dragMode = 'stageDrag';
      updateOutlines();
      return;
    } else {
      selectedStageId = null;
      updateOutlines();
    }
  }

  if (viewMode === '3D') {
    dragMode = 'rotate';
  } else {
    dragMode = 'pan';
  }
}

function handlePointerMove(clientX, clientY) {
  if (Math.abs(clientX - downMouseX) > 3 || Math.abs(clientY - downMouseY) > 3) {
    mouseMovedDuringClick = true;
  }
  if (viewMode === '2D') {
    setMouseFromCoords(clientX, clientY);
    const gh = intersectGround();
    if (gh) {
      document.getElementById('ruler-info').textContent =
        'X: ' + gh.x.toFixed(2) + ' m | Z: ' + gh.z.toFixed(2) + ' m | Grid: ' + (settings.snapToGrid ? 'ON' : 'OFF');
    }
  }
  if (!isLeftDragging) return;
  setMouseFromCoords(clientX, clientY);
  const dx = clientX - lastMouseX;
  const dy = clientY - lastMouseY;

  if (dragMode === 'rotate') {
    theta -= dx * 0.008;
    phi = Math.max(0.2, Math.min(Math.PI * 0.49, phi + dy * 0.008));
    updateCamera();
  } else if (dragMode === 'pan') {
    const a = window.innerWidth / window.innerHeight;
    const wPerPxX = (2 * orthoSize * a) / window.innerWidth;
    const wPerPxZ = (2 * orthoSize) / window.innerHeight;
    orthoCam.position.x -= dx * wPerPxX;
    orthoCam.position.z -= dy * wPerPxZ;
  } else if (dragMode === 'fixtureDrag') {
    const gh = intersectGround();
    if (gh && dragGroundOffset.userData) {
      const refFid = dragGroundOffset.userData.refFid;
      const newX = gh.x - dragGroundOffset.x;
      const newZ = gh.z - dragGroundOffset.z;
      const refStart = dragStartPositions[refFid];
      if (refStart) {
        const dxw = snap(newX) - refStart.x;
        const dzw = snap(newZ) - refStart.z;
        for (const fid of selectedFids) {
          const start = dragStartPositions[fid];
          const f = fixtures[fid];
          if (start && f) {
            f.group.position.x = start.x + dxw;
            f.group.position.z = start.z + dzw;
            if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
          }
        }
      }
    }
  } else if (dragMode === 'stageDrag' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    const gh = intersectGround();
    if (gh && so && dragStartStagePos) {
      const nx = snap(gh.x - dragStartStagePos.offsetX);
      const nz = snap(gh.z - dragStartStagePos.offsetZ);
      so.mesh.position.x = nx;
      so.mesh.position.z = nz;
      so.data.position.x = nx;
      so.data.position.z = nz;
      if (so._helper) so._helper.update();
      updateResizeHandles();
    }
  } else if (dragMode === 'stageResize' && selectedStageId && dragResizeStart) {
    const so = stageObjects[selectedStageId];
    const gh = intersectGround();
    if (gh && so) {
      const fx = dragResizeStart.fixedX;
      const fz = dragResizeStart.fixedZ;
      const newGripX = snap(gh.x);
      const newGripZ = snap(gh.z);
      const newSizeX = Math.max(0.2, Math.abs(newGripX - fx));
      const newSizeZ = Math.max(0.2, Math.abs(newGripZ - fz));
      const newCX = (fx + newGripX) / 2;
      const newCZ = (fz + newGripZ) / 2;
      updateStageObjectProps(selectedStageId, {
        size: {x: newSizeX, z: newSizeZ},
        position: {x: newCX, z: newCZ},
      });
      if (so._helper) so._helper.update();
      updateResizeHandles();
    }
  } else if (dragMode === 'marquee') {
    const m = document.getElementById('marquee');
    const x1 = Math.min(downMouseX, clientX);
    const y1 = Math.min(downMouseY, clientY);
    const x2 = Math.max(downMouseX, clientX);
    const y2 = Math.max(downMouseY, clientY);
    m.style.left = x1 + 'px';
    m.style.top = y1 + 'px';
    m.style.width = (x2 - x1) + 'px';
    m.style.height = (y2 - y1) + 'px';
  }
  lastMouseX = clientX; lastMouseY = clientY;
}

function handlePointerUp(shiftKey) {
  if (!isLeftDragging) return;
  isLeftDragging = false;
  if (dragMode === 'fixtureDrag') {
    for (const fid of selectedFids) {
      const f = fixtures[fid];
      if (!f) continue;
      if (bridge && bridge.fixturePositionChanged) {
        try {
          bridge.fixturePositionChanged(
            String(fid),
            f.group.position.x,
            f.group.position.y,
            f.group.position.z
          );
        } catch (err) {}
      }
    }
  }
  if (dragMode === 'stageDrag' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    if (so) {
      so.data.position.x = so.mesh.position.x;
      so.data.position.y = so.mesh.position.y;
      so.data.position.z = so.mesh.position.z;
    }
    notifyStageListChanged();
  }
  if (dragMode === 'stageResize' && selectedStageId) {
    notifyStageListChanged();
    updateResizeHandles();
    dragResizeCorner = null;
    dragResizeStart = null;
  }
  if (dragMode === 'marquee') {
    const m = document.getElementById('marquee');
    const rect = renderer.domElement.getBoundingClientRect();
    const x1 = parseInt(m.style.left, 10);
    const y1 = parseInt(m.style.top, 10);
    const w = parseInt(m.style.width, 10);
    const h = parseInt(m.style.height, 10);
    m.style.display = 'none';
    const newlySelected = [];
    for (const fid in fixtures) {
      const f = fixtures[fid];
      const pos = (viewMode === '2D' && f.icon) ? f.icon.position.clone() : f.group.position.clone();
      const screen = pos.project(activeCam);
      const sx = ((screen.x + 1) / 2) * rect.width + rect.left;
      const sy = ((1 - screen.y) / 2) * rect.height + rect.top;
      if (sx >= x1 && sx <= x1 + w && sy >= y1 && sy <= y1 + h) {
        newlySelected.push(Number(fid));
      }
    }
    if (shiftKey) {
      for (const fid of newlySelected) if (!selectedFids.includes(fid)) selectedFids.push(fid);
    } else {
      selectedFids = newlySelected;
    }
    updateOutlines();
  }
  dragMode = 'none';
}

// Mouse listeners (thin wrappers)
renderer.domElement.addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  handlePointerDown(e.clientX, e.clientY, e.shiftKey);
}, false);

window.addEventListener('mouseup', function(e) {
  handlePointerUp(e.shiftKey);
});

window.addEventListener('mousemove', function(e) {
  handlePointerMove(e.clientX, e.clientY);
  // Tooltip (Maus-only, bei Touch irrelevant)
  if (!isLeftDragging) {
    setMouseFromCoords(e.clientX, e.clientY);
    const fid = pickFixture();
    const tt = document.getElementById('tooltip');
    if (fid != null && fixtures[fid]) {
      const f = fixtures[fid];
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 12) + 'px';
      tt.style.top = (e.clientY - 8) + 'px';
      const pos = f.group.position;
      tt.textContent = '[' + fid + '] ' + (f.data.label || '?') + ' - ' + f.type +
        '  (X:' + pos.x.toFixed(1) + ' Y:' + pos.y.toFixed(1) + ' Z:' + pos.z.toFixed(1) + ')';
    } else {
      tt.style.display = 'none';
    }
  }
});

renderer.domElement.addEventListener('wheel', function(e) {
  if (viewMode === '3D') {
    radius = Math.max(4, Math.min(120, radius + e.deltaY * 0.04));
    updateCamera();
  } else {
    orthoSize = Math.max(4, Math.min(80, orthoSize + e.deltaY * 0.02));
    resizeOrtho();
  }
}, { passive: true });

// ============================================================================
// Touch support (Pinch-Zoom + Long-Press statt Rechtsklick + Drag)
// ============================================================================
let lastTouchDist = 0;
let longPressTimer = null;
let _lpTouchX = 0, _lpTouchY = 0;
let _fabLastPlaceCoords = null;

function _showLongPressRing(cx, cy) {
  const ring = document.getElementById('longpress-ring');
  if (!ring) return;
  ring.style.left = cx + 'px';
  ring.style.top = cy + 'px';
  ring.style.display = 'block';
  ring.style.animation = 'none';
  ring.offsetHeight; // trigger reflow
  ring.style.animation = 'lp-pulse 0.6s ease-out';
  setTimeout(function() { if (ring) ring.style.display = 'none'; }, 700);
}

renderer.domElement.addEventListener('touchstart', function(e) {
  e.preventDefault();
  document.getElementById('tooltip').style.display = 'none';
  if (e.touches.length === 1) {
    const t = e.touches[0];
    _lpTouchX = t.clientX; _lpTouchY = t.clientY;
    // Long-Press (600ms) = Fixture platzieren (ersetzt Rechtsklick)
    longPressTimer = setTimeout(function() {
      longPressTimer = null;
      setMouseFromCoords(_lpTouchX, _lpTouchY);
      _placeFixtureAtMouse();
      _showLongPressRing(_lpTouchX, _lpTouchY);
      isLeftDragging = false;
      dragMode = 'none';
    }, 600);
    handlePointerDown(t.clientX, t.clientY, false);
  } else if (e.touches.length === 2) {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    isLeftDragging = false;
    dragMode = 'none';
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (e.touches.length === 1) {
    const t = e.touches[0];
    handlePointerMove(t.clientX, t.clientY);
  } else if (e.touches.length === 2) {
    // Zwei-Finger Pinch-Zoom
    isLeftDragging = false;
    dragMode = 'none';
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const delta = lastTouchDist - dist;
    if (viewMode === '3D') {
      radius = Math.max(4, Math.min(120, radius + delta * 0.06));
      updateCamera();
    } else {
      orthoSize = Math.max(4, Math.min(80, orthoSize + delta * 0.03));
      resizeOrtho();
    }
    lastTouchDist = dist;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', function(e) {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (e.touches.length === 0) {
    handlePointerUp(false);
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    lastMouseX = t.clientX;
    lastMouseY = t.clientY;
  }
}, { passive: false });

// ============================================================================
// Floating Action Buttons (FABs) – sichtbar im Touch-Betrieb
// ============================================================================
function fabDelete() {
  if (editMode === 'edit' && selectedFids.length > 0) {
    for (const fid of selectedFids.slice()) {
      if (bridge && bridge.fixtureDeleted) {
        try { bridge.fixtureDeleted(String(fid)); } catch (err) {}
      }
      removeFixture(fid);
    }
    selectedFids = [];
    updateOutlines();
  } else if (editMode === 'stage' && selectedStageId) {
    removeStageObject(selectedStageId);
  }
}

function fabRotate() {
  if (editMode === 'stage' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    if (so) {
      so.mesh.rotation.y += Math.PI / 2;
      so.data.rotation = so.mesh.rotation.y;
      if (so._helper) so._helper.update();
    }
  }
}

function fabPlace() {
  const cx = _fabLastPlaceCoords ? _fabLastPlaceCoords.x : 0;
  const cz = _fabLastPlaceCoords ? _fabLastPlaceCoords.z : 0;
  if (bridge && bridge.placeFixture) {
    bridge.placeFixture(JSON.stringify({ x: snap(cx), y: 6.5, z: snap(cz) }));
  }
}

function updateFABs() {
  const btnDelete = document.getElementById('fab-delete');
  const btnRotate = document.getElementById('fab-rotate');
  const btnPlace  = document.getElementById('fab-place');
  const hasFixtureSel = editMode === 'edit' && selectedFids.length > 0;
  const hasStageSel   = editMode === 'stage' && !!selectedStageId;
  if (btnDelete) btnDelete.style.display = (hasFixtureSel || hasStageSel) ? 'flex' : 'none';
  if (btnRotate) btnRotate.style.display = hasStageSel ? 'flex' : 'none';
  if (btnPlace)  btnPlace.style.display  = (editMode === 'edit') ? 'flex' : 'none';
}

// Keyboard
window.addEventListener('keydown', function(e) {
  if (e.key === 'Delete') {
    if (editMode === 'edit' && selectedFids.length > 0) {
      for (const fid of selectedFids.slice()) {
        if (bridge && bridge.fixtureDeleted) {
          try { bridge.fixtureDeleted(String(fid)); } catch (err) {}
        }
        removeFixture(fid);
      }
      selectedFids = [];
      updateOutlines();
    } else if (editMode === 'stage' && selectedStageId) {
      removeStageObject(selectedStageId);
    }
  } else if ((e.key === 'r' || e.key === 'R') && editMode === 'stage' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    if (so) {
      so.mesh.rotation.y += Math.PI / 2;
      so.data.rotation = so.mesh.rotation.y;
      if (so._helper) so._helper.update();
    }
  } else if (e.key === 'Escape') {
    selectedFids = [];
    selectedStageId = null;
    updateOutlines();
  }
});

// ============================================================================
// Camera
// ============================================================================
let theta = 0.3, phi = 1.1, radius = 22;
function updateCamera() {
  perspectiveCam.position.x = radius * Math.sin(phi) * Math.sin(theta);
  perspectiveCam.position.y = radius * Math.cos(phi);
  perspectiveCam.position.z = radius * Math.sin(phi) * Math.cos(theta);
  perspectiveCam.lookAt(0, 2, 0);
}
updateCamera();

window.addEventListener('resize', function() {
  perspectiveCam.aspect = window.innerWidth / window.innerHeight;
  perspectiveCam.updateProjectionMatrix();
  resizeOrtho();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================================
// Settings
// ============================================================================
function applySettings(s) {
  if (typeof s.beamOpacity === 'number') settings.beamOpacity = s.beamOpacity;
  if (typeof s.showCones === 'boolean') settings.showCones = s.showCones;
  if (typeof s.showFloorSpots === 'boolean') settings.showFloorSpots = s.showFloorSpots;
  if (typeof s.showFog === 'boolean') {
    settings.showFog = s.showFog;
    if (s.showFog && viewMode === '3D') {
      const bg = scene.background ? scene.background.getHex() : 0x080808;
      scene.fog = new THREE.FogExp2(bg, Math.max(0.005, 0.025 * (1 - settings.brightness)));
    } else {
      scene.fog = null;
    }
  }
  if (typeof s.snapToGrid === 'boolean') settings.snapToGrid = s.snapToGrid;
  if (typeof s.gridStep === 'number') settings.gridStep = s.gridStep;
  if (typeof s.brightness === 'number') applyBrightness(s.brightness);
  if (typeof s.autoBrightness === 'boolean') settings.autoBrightness = s.autoBrightness;
  if (typeof s.stagePreset === 'string' && s.stagePreset !== settings.stagePreset) {
    setStagePreset(s.stagePreset);
  }
  for (const fid in fixtures) {
    const f = fixtures[fid];
    if (f.beam) f.beam.visible = settings.showCones && (viewMode === '3D') && f.beam.material.opacity > 0.01;
    if (f.floorSpot) f.floorSpot.visible = settings.showFloorSpots && f.floorSpot.material.opacity > 0.01;
  }
}

// ============================================================================
// Python bridge actions used externally
// ============================================================================
function jsAddStageObject(type) {
  return createStageObject(type, null, null, null, 0, null, null);
}

function jsRemoveStageObject(id) {
  removeStageObject(id);
}

function jsSelectStageObject(id) {
  selectedStageId = id || null;
  updateOutlines();
}

function jsApplyFixtureTransform(fid, x, y, z, rotY) {
  const f = fixtures[fid];
  if (!f) return;
  if (x != null) f.group.position.x = x;
  if (y != null) f.group.position.y = y;
  if (z != null) f.group.position.z = z;
  if (rotY != null) f.group.rotation.y = rotY;
  if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
}

function jsAlignSelected(mode) {
  if (selectedFids.length < 2) return;
  const fs = selectedFids.map(fid => fixtures[fid]).filter(Boolean);
  if (fs.length < 2) return;
  let val;
  if (mode === 'left') {
    val = Math.min(...fs.map(f => f.group.position.x));
    fs.forEach(f => f.group.position.x = val);
  } else if (mode === 'right') {
    val = Math.max(...fs.map(f => f.group.position.x));
    fs.forEach(f => f.group.position.x = val);
  } else if (mode === 'front') {
    val = Math.max(...fs.map(f => f.group.position.z));
    fs.forEach(f => f.group.position.z = val);
  } else if (mode === 'back') {
    val = Math.min(...fs.map(f => f.group.position.z));
    fs.forEach(f => f.group.position.z = val);
  } else if (mode === 'center_x') {
    val = fs.reduce((s, f) => s + f.group.position.x, 0) / fs.length;
    fs.forEach(f => f.group.position.x = val);
  } else if (mode === 'center_z') {
    val = fs.reduce((s, f) => s + f.group.position.z, 0) / fs.length;
    fs.forEach(f => f.group.position.z = val);
  }
  pushTransformsToPython();
}

function jsDistributeSelected(axis) {
  if (selectedFids.length < 3) return;
  const fs = selectedFids.map(fid => fixtures[fid]).filter(Boolean);
  if (fs.length < 3) return;
  const key = (axis === 'x') ? 'x' : 'z';
  fs.sort((a, b) => a.group.position[key] - b.group.position[key]);
  const min = fs[0].group.position[key];
  const max = fs[fs.length - 1].group.position[key];
  const step = (max - min) / (fs.length - 1);
  fs.forEach((f, i) => f.group.position[key] = min + step * i);
  pushTransformsToPython();
}

function pushTransformsToPython() {
  for (const fid of selectedFids) {
    const f = fixtures[fid];
    if (!f) continue;
    if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
    if (bridge && bridge.fixturePositionChanged) {
      try {
        bridge.fixturePositionChanged(String(fid), f.group.position.x, f.group.position.y, f.group.position.z);
      } catch (err) {}
    }
  }
}

// ============================================================================
// Qt WebChannel
// ============================================================================
let bridge = null;
function tryChannel() {
  if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
    new QWebChannel(qt.webChannelTransport, function(channel) {
      bridge = channel.objects.bridge;
      if (bridge) {
        if (bridge.fixtureAdded)   bridge.fixtureAdded.connect(j => { addFixture(JSON.parse(j)); });
        if (bridge.fixtureRemoved) bridge.fixtureRemoved.connect(fid => { removeFixture(fid); });
        if (bridge.dmxUpdated)     bridge.dmxUpdated.connect(j => {
          const d = JSON.parse(j);
          updateFixture(d.fid, d.r, d.g, d.b, d.intensity, d.pan||128, d.tilt||128);
        });
        if (bridge.allFixtures)    bridge.allFixtures.connect(j => {
          const list = JSON.parse(j);
          list.forEach(f => addFixture(f));
        });
        if (bridge.settingsChanged) bridge.settingsChanged.connect(j => applySettings(JSON.parse(j)));
        if (bridge.stageChanged)   bridge.stageChanged.connect(name => setStagePreset(name));
        if (bridge.viewModeChanged) bridge.viewModeChanged.connect(name => setViewMode(name));
        if (bridge.editModeChanged) bridge.editModeChanged.connect(name => setEditMode(name));
        if (bridge.stageLoaded)    bridge.stageLoaded.connect(j => loadStageJson(j));
        if (bridge.addStageObject) bridge.addStageObject.connect(t => jsAddStageObject(t));
        if (bridge.removeStageObject) bridge.removeStageObject.connect(id => jsRemoveStageObject(id));
        if (bridge.selectStageObject) bridge.selectStageObject.connect(id => jsSelectStageObject(id));
        if (bridge.applyFixtureTransform) bridge.applyFixtureTransform.connect(j => {
          const d = JSON.parse(j);
          jsApplyFixtureTransform(d.fid, d.x, d.y, d.z, d.rotY);
        });
        if (bridge.alignSelected)   bridge.alignSelected.connect(m => jsAlignSelected(m));
        if (bridge.distributeSelected) bridge.distributeSelected.connect(a => jsDistributeSelected(a));
        if (bridge.requestSaveStage) bridge.requestSaveStage.connect(() => {
          try { bridge.saveStage(JSON.stringify(getStageJson())); } catch (e) {}
        });
        if (bridge.cameraReset)    bridge.cameraReset.connect(() => { theta = 0.3; phi = 1.1; radius = 22; updateCamera(); orthoSize = 18; orthoCam.position.set(0,60,0.001); orthoCam.lookAt(0,0,0); resizeOrtho(); });
        if (bridge.brightnessSignal) bridge.brightnessSignal.connect(v => setBrightnessManual(v));
        if (bridge.brightnessAutoSignal) bridge.brightnessAutoSignal.connect(() => resetBrightnessAuto());
        if (bridge.updateStageObject) bridge.updateStageObject.connect(j => {
          try {
            const d = JSON.parse(j);
            updateStageObjectProps(d.id, d);
          } catch (err) { console.log('updateStageObject err:', err); }
        });
        if (bridge.resizeModeSignal) bridge.resizeModeSignal.connect(on => setResizeModeEnabled(on));
        if (bridge.requestFixtures) bridge.requestFixtures();
      }
    });
  } else {
    setTimeout(tryChannel, 200);
  }
}
setTimeout(tryChannel, 200);

// ============================================================================
// Render loop
// ============================================================================
function animate() {
  requestAnimationFrame(animate);
  // Pulsierende Emissive-Farbe fuer das selektierte Stage-Element (sehr sichtbar)
  if (selectedStageId && stageObjects[selectedStageId]) {
    const so = stageObjects[selectedStageId];
    const t = Date.now() * 0.005;
    const pulse = 0.5 + 0.5 * Math.sin(t);
    applyStageEmissive(so.mesh, pulse * 0.7, pulse * 0.45, 0.0);
    // Resize-Handles pulsen ebenfalls (Skala leicht moduliert)
    const handleScale = 1.0 + 0.15 * Math.sin(t * 1.4);
    for (const h of resizeHandles) {
      h.scale.set(handleScale, handleScale, handleScale);
    }
    if (so._helper) so._helper.update();
  }
  renderer.render(scene, activeCam);
}
animate();

// Initial Brightness anwenden (Default = dunkel fuer Beam-Wiedergabe)
applyBrightness(settings.brightness);

// Expose for debug
window.__lightos = { fixtures, stageObjects, settings,
  setViewMode, setEditMode, setStagePreset, getStageJson, loadStageJson,
  addStageObject: jsAddStageObject,
  clearStageObjects, updateResizeHandles, resizeHandles: () => resizeHandles,
  setBrightnessManual, resetBrightnessAuto, applyBrightness };
</script>
</body>
