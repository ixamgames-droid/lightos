function buildLaser() {
  const group = new THREE.Group();
  // Small emitter body
  const emitterMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, metalness: 0.7, roughness: 0.3 });
  const emitter = new THREE.Mesh(
    new THREE.BoxGeometry(0.22, 0.14, 0.18),
    emitterMat
  );
  emitter.castShadow = true;
  group.add(emitter);
  // Aperture lamp (emissive; colour driven by DMX)
  const lamp = new THREE.Mesh(
    new THREE.CircleGeometry(0.04, 10),
    new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1.0, roughness: 0.05, side: THREE.DoubleSide })
  );
  lamp.position.set(0, 0, -0.1);
  lamp.rotation.x = Math.PI / 2;
  group.add(lamp);
  // Fan of ~5 thin emissive beam lines radiating forward (downward in world-Y when hung)
  const beamMat = new THREE.MeshBasicMaterial({
    color: 0x00ff00,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const FAN_ANGLES = [-0.35, -0.175, 0, 0.175, 0.35];  // radians spread in X
  const laserBeams = [];
  FAN_ANGLES.forEach((angle) => {
    const beamLen = 1.8;
    const geo = new THREE.CylinderGeometry(0.005, 0.005, beamLen, 4);
    const beam = new THREE.Mesh(geo, beamMat.clone());
    // Position: start just below emitter, fan out along Z (forward) with X spread
    beam.position.set(Math.sin(angle) * beamLen * 0.5, 0, -0.1 - Math.cos(angle) * beamLen * 0.5);
    beam.rotation.x = Math.PI / 2 - angle * 0.6;  // tilt so beam fans outward
    beam.rotation.z = angle;
    group.add(beam);
    laserBeams.push(beam);
  });
  // laserBeams zurueckgeben, damit updateFixture sie per DMX faerbt/dimmt
  // (vorher fix gruen 0x00ff00 / opacity 0.6, unabhaengig von Farbe/Intensitaet).
  return { group, head: group, lamp, laserBeams };
}

// ── Spider (Doppel-Bar Moving Head) ─────────────────────────────────────────
// Echtes Geraet (z.B. U King SPIDER14): KEIN Pan/Yoke, sondern ZWEI PARALLEL
// liegende Lichtleisten/Bars mit je EIGENEM Tilt-Motor. Jede Bar traegt 4
// EINZELFARBEN-LEDs (kein RGBW-Mix pro Linse): Bar L = Rot, Gruen, Blau, Weiss;
// Bar R ist GESPIEGELT = Weiss, Blau, Gruen, Rot. Jede LED leuchtet einzeln nach
// ihrem eigenen Kanal (color_r->rote LED, color_g->gruene, color_b->blaue,
// color_w->weisse). Die zwei Bars schwenken gegeneinander (Tilt um X) = Schere.
// mirrored (Default true): 2. Bar zeigt die Farben GESPIEGELT (W,B,G,R). Bei
// false sind beide Bars gleichlaeufig/parallel (R,G,B,W) — selber Controller,
// leicht andere Bauweise (per-Fixture-Option im Patch-Dialog).
function buildSpider(mirrored) {
  const group = new THREE.Group();
  // ── Nicer central body (replaces plain bracket) ───────────────────────────
  // Main body block — slightly chamfered look via two layered boxes
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, metalness: 0.7, roughness: 0.38 });
  const bodyMain = new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.18, 0.54), bodyMat);
  bodyMain.position.y = 0.12;
  bodyMain.castShadow = true;
  group.add(bodyMain);
  // Slim accent strip along the front face of the body
  const accentMat = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, metalness: 0.8, roughness: 0.3 });
  const accentStrip = new THREE.Mesh(new THREE.BoxGeometry(0.86, 0.04, 0.03), accentMat);
  accentStrip.position.set(0, 0.12, 0.275);
  group.add(accentStrip);
  // Side ribs for visual detail
  [-0.38, 0.38].forEach((xOff) => {
    const rib = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.22, 0.56), bodyMat);
    rib.position.set(xOff, 0.12, 0);
    rib.castShadow = true;
    group.add(rib);
  });

  // ── Top yoke-mount cap (non-emissive, on root group) ──────────────────────
  const yokeMat = new THREE.MeshStandardMaterial({ color: 0x252525, metalness: 0.75, roughness: 0.35 });
  const yokeCap = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.13, 0.10, 14), yokeMat);
  yokeCap.position.set(0, 0.27, 0);
  yokeCap.castShadow = true;
  group.add(yokeCap);
  // Small bolt detail on top of cap
  const boltMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.9, roughness: 0.2 });
  const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.06, 8), boltMat);
  bolt.position.set(0, 0.35, 0);
  group.add(bolt);

  // Fixfarben der LEDs. ch = Index in [color_r, color_g, color_b, color_w].
  const LED = {
    r: { c: new THREE.Color(1.00, 0.00, 0.00), ch: 0 },
    g: { c: new THREE.Color(0.00, 1.00, 0.00), ch: 1 },
    b: { c: new THREE.Color(0.10, 0.25, 1.00), ch: 2 },
    w: { c: new THREE.Color(1.00, 1.00, 1.00), ch: 3 },
  };
  // Bar L (Bank 1, vorne): immer R G B W.
  const barL = [LED.r, LED.g, LED.b, LED.w];
  // Bar R (Bank 2, hinten): gespiegelt W B G R, oder parallel R G B W.
  const barR = (mirrored === false)
    ? [LED.r, LED.g, LED.b, LED.w]
    : [LED.w, LED.b, LED.g, LED.r];
  const LAYOUT = [
    { zoff: -0.17, leds: barL },
    { zoff:  0.17, leds: barR },
  ];
  const XS = [-0.27, -0.09, 0.09, 0.27];   // LED-Positionen entlang der Bar (X)

  const bars = [];
  LAYOUT.forEach((def) => {
    // Pivot dreht die ganze Bar um X (Tilt). rotation.x=0 => Beams nach unten.
    const pivot = new THREE.Group();
    pivot.position.set(0, 0, def.zoff);
    group.add(pivot);
    // Bar-Koerper laeuft entlang X
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.72, 0.07, 0.10),
      new THREE.MeshStandardMaterial({ color: 0x0d0d0d, metalness: 0.5, roughness: 0.5 })
    );
    arm.castShadow = true;
    pivot.add(arm);

    // ── Cosmetic additions on the pivot (tilt with the bar) ────────────────
    // Bottom fascia strip — a thin plate below the arm
    const fasciaMat = new THREE.MeshStandardMaterial({ color: 0x202020, metalness: 0.6, roughness: 0.42 });
    const fascia = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.018, 0.12), fasciaMat);
    fascia.position.set(0, -0.07, 0);
    pivot.add(fascia);

    // End-cap discs at the arm ends (cosmetic, non-emissive)
    const capMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.65, roughness: 0.4 });
    [-0.36, 0.36].forEach((xEnd) => {
      const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.038, 0.038, 0.10, 10), capMat);
      cap.rotation.z = Math.PI / 2;
      cap.position.set(xEnd, 0, 0);
      pivot.add(cap);
    });

    const lenses = [];
    def.leds.forEach((led, k) => {
      // Grund-Tint in der LED-Fixfarbe (dezent), damit man die R/G/B/W-Anordnung
      // auch bei dunkler LED erkennt.
      const lens = new THREE.Mesh(
        new THREE.CircleGeometry(0.05, 18),
        new THREE.MeshStandardMaterial({
          color: led.c.clone().multiplyScalar(0.22),
          emissive: 0x000000, roughness: 0.25, side: THREE.DoubleSide,
        })
      );
      lens.position.set(XS[k], -0.05, 0);
      lens.rotation.x = -Math.PI / 2;        // Flaeche zeigt nach unten
      lens.userData.ledColor = led.c;
      lens.userData.ch = led.ch;             // welcher Kanal diese LED treibt
      pivot.add(lens);
      lenses.push(lens);

      // Thin bezel ring around each lens (RingGeometry, non-emissive, on pivot)
      const bezelMat = new THREE.MeshStandardMaterial({ color: 0x303030, metalness: 0.75, roughness: 0.35, side: THREE.DoubleSide });
      const bezel = new THREE.Mesh(
        new THREE.RingGeometry(0.051, 0.068, 18),
        bezelMat
      );
      bezel.position.set(XS[k], -0.048, 0);  // same plane as lens, slightly raised
      bezel.rotation.x = -Math.PI / 2;
      pivot.add(bezel);
    });
    bars.push({ pivot, lenses, beams: [] });
  });
  return { group, bars, isSpider: true };
}

function buildFixtureModel(type, opts) {
  opts = opts || {};
  switch (type) {
    case 'moving_head': return buildMovingHead();
    case 'spider':      return buildSpider(opts.mirror);
    case 'par':         return buildPar();
    case 'led_bar':     return buildLedBar();
    case 'strobe':      return buildStrobe();
    case 'dimmer':      return buildDimmer();
    case 'scanner':     return buildScanner();
    case 'smoke':       return buildSmoke();
    case 'hazer':       return buildHazer();
    case 'laser':       return buildLaser();
    default:            return buildPar();
  }
}

// 2D top-down icon
function buildTopDownIcon(type) {
  const group = new THREE.Group();
  const matLine = new THREE.LineBasicMaterial({ color: 0xcccccc });
  let body, ring;
  if (type === 'moving_head') {
    // circle + arrow
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.6, 24),
      new THREE.MeshBasicMaterial({ color: 0x2a4060, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    const arrowPts = [
      new THREE.Vector3(0, 0.05, 0),
      new THREE.Vector3(0, 0.05, -0.7),
    ];
    const arrowGeo = new THREE.BufferGeometry().setFromPoints(arrowPts);
    const arrow = new THREE.Line(arrowGeo, matLine);
    group.add(arrow);
    const tipPts = [
      new THREE.Vector3(-0.15, 0.05, -0.5),
      new THREE.Vector3(0, 0.05, -0.7),
      new THREE.Vector3(0.15, 0.05, -0.5),
    ];
    const tipGeo = new THREE.BufferGeometry().setFromPoints(tipPts);
    const tip = new THREE.Line(tipGeo, matLine);
    group.add(tip);
  } else if (type === 'par') {
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.55, 24),
      new THREE.MeshBasicMaterial({ color: 0x404040, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  } else if (type === 'led_bar') {
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(1.6, 0.4),
      new THREE.MeshBasicMaterial({ color: 0x303030, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  } else if (type === 'spider') {
    // zwei kurze parallele Bars (Top-Down)
    const mkBar = (zoff) => {
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(1.3, 0.16),
        new THREE.MeshBasicMaterial({ color: 0x303048, transparent: true, opacity: 0.85 })
      );
      m.rotation.x = -Math.PI / 2;
      m.position.z = zoff;
      return m;
    };
    body = mkBar(-0.22);
    group.add(body);
    group.add(mkBar(0.22));
  } else if (type === 'strobe') {
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, 0.8),
      new THREE.MeshBasicMaterial({ color: 0x505050, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // X cross
    const xpts = [
      new THREE.Vector3(-0.35, 0.05, -0.35), new THREE.Vector3(0.35, 0.05, 0.35),
      new THREE.Vector3(-0.35, 0.05, 0.35), new THREE.Vector3(0.35, 0.05, -0.35),
    ];
    const xGeo = new THREE.BufferGeometry().setFromPoints(xpts);
    const xLine = new THREE.LineSegments(xGeo, matLine);
    group.add(xLine);
  } else if (type === 'scanner') {
    // Square base + diagonal mirror line (top-down view of tilted mirror)
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, 0.8),
      new THREE.MeshBasicMaterial({ color: 0x203040, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // Diagonal line representing the mirror
    const mpts = [
      new THREE.Vector3(-0.28, 0.05, -0.28),
      new THREE.Vector3(0.28, 0.05, 0.28),
    ];
    const mGeo = new THREE.BufferGeometry().setFromPoints(mpts);
    const mLine = new THREE.Line(mGeo, new THREE.LineBasicMaterial({ color: 0x88ccff }));
    group.add(mLine);
    // Arrow showing beam direction
    const sPts = [
      new THREE.Vector3(0, 0.05, 0),
      new THREE.Vector3(0, 0.05, -0.55),
    ];
    const sGeo = new THREE.BufferGeometry().setFromPoints(sPts);
    group.add(new THREE.Line(sGeo, matLine));
    const stPts = [
      new THREE.Vector3(-0.12, 0.05, -0.38),
      new THREE.Vector3(0, 0.05, -0.55),
      new THREE.Vector3(0.12, 0.05, -0.38),
    ];
    const stGeo = new THREE.BufferGeometry().setFromPoints(stPts);
    group.add(new THREE.Line(stGeo, matLine));
  } else if (type === 'smoke') {
    // Rounded rectangle (wider than tall) + cloud-puff arcs suggestion
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(0.9, 0.55),
      new THREE.MeshBasicMaterial({ color: 0x3a3a3a, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // Three small circles suggesting puff output
    [{ x: -0.22, z: -0.32 }, { x: 0, z: -0.38 }, { x: 0.22, z: -0.32 }].forEach(p => {
      const puff = new THREE.Mesh(
        new THREE.CircleGeometry(0.08, 12),
        new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.55 })
      );
      puff.rotation.x = -Math.PI / 2;
      puff.position.set(p.x, 0.04, p.z);
      group.add(puff);
    });
  } else if (type === 'hazer') {
    // Wide rectangle (landscape) + haze wave lines
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 0.55),
      new THREE.MeshBasicMaterial({ color: 0x353530, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // Two parallel wave-suggest lines across the front
    [-0.12, 0.12].forEach(xOff => {
      const wPts = [
        new THREE.Vector3(-0.38, 0.05, xOff),
        new THREE.Vector3(-0.19, 0.05, xOff - 0.08),
        new THREE.Vector3(0, 0.05, xOff),
        new THREE.Vector3(0.19, 0.05, xOff - 0.08),
        new THREE.Vector3(0.38, 0.05, xOff),
      ];
      const wGeo = new THREE.BufferGeometry().setFromPoints(wPts);
      group.add(new THREE.Line(wGeo, new THREE.LineBasicMaterial({ color: 0xaaaaaa })));
    });
  } else if (type === 'laser') {
    // Small square emitter body + radiating beam lines
    body = new THREE.Mesh(
      new THREE.PlaneGeometry(0.4, 0.3),
      new THREE.MeshBasicMaterial({ color: 0x102010, transparent: true, opacity: 0.9 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
    // Fan of 5 beam rays radiating forward (negative Z = forward in top-down)
    const fanAngles = [-0.4, -0.2, 0, 0.2, 0.4];
    fanAngles.forEach(a => {
      const len = 0.75;
      const rPts = [
        new THREE.Vector3(0, 0.05, -0.15),
        new THREE.Vector3(Math.sin(a) * len, 0.05, -0.15 - Math.cos(a) * len),
      ];
      const rGeo = new THREE.BufferGeometry().setFromPoints(rPts);
      group.add(new THREE.Line(rGeo, new THREE.LineBasicMaterial({ color: 0x44ff44 })));
    });
  } else {
    body = new THREE.Mesh(
      new THREE.CircleGeometry(0.45, 16),
      new THREE.MeshBasicMaterial({ color: 0x606060, transparent: true, opacity: 0.85 })
    );
    body.rotation.x = -Math.PI / 2;
    group.add(body);
  }
  // Outline ring
  ring = new THREE.Mesh(
    new THREE.RingGeometry(0.62, 0.72, 24),
    new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.0, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.03;
  group.add(ring);
  group.userData.body = body;
  group.userData.ring = ring;
  // Force-pickable via tag
  body.userData.isTopDownIcon = true;
  body.userData.isFixtureMesh = true;
  // 2D-OCCLUSION-FIX: Fixture-Icons IMMER ueber (translucenten) Buehnen-Objekten
  // zeichnen, damit Strahler in der Top-Down-Ansicht nie unter einer Plattform/
  // einem Boden verschwinden (depthTest aus + hohe renderOrder).
  body.renderOrder = 3;
  ring.renderOrder = 3;
  if (body.material) body.material.depthTest = false;
  return group;
}

// ── Beam helpers ─────────────────────────────────────────────────────────────
function createBeamCone(color, intensity, angle, length) {
  const radius = Math.tan(angle) * length;
  const geo = new THREE.ConeGeometry(radius, length, 24, 1, true);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: Math.max(0.02, intensity * settings.beamOpacity),
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const cone = new THREE.Mesh(geo, mat);
  cone.position.y = -length / 2;
  cone.visible = settings.showCones;
  return cone;
}

function createFloorSpot(color, intensity, radius) {
  const geo = new THREE.CircleGeometry(radius, 32);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: Math.max(0.0, intensity * 0.55),
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const disc = new THREE.Mesh(geo, mat);
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = 0.01;
  disc.visible = settings.showFloorSpots;
  return disc;
}

function addFixture(data) {
  const fid = data.fid;
  if (fixtures[fid]) removeFixture(fid);
  // 'model' ist das Render-Modell (von Python bestimmt, z.B. 'spider' fuer
  // Doppel-Bar-Geraete); faellt auf den fixture_type zurueck.
  const rtype = data.model || data.type || 'par';
  const model = buildFixtureModel(rtype, { mirror: data.mirror });
  const root = new THREE.Group();
  root.position.set(data.x || 0, data.y == null ? 6.5 : data.y, data.z || 0);
  // Multi-Achsen-Ausrichtung (Grad aus Python) gleich beim Erzeugen setzen.
  root.rotation.set(deg2rad(data.rotX), deg2rad(data.rotY), deg2rad(data.rotZ));
  root.add(model.group);

  const color = new THREE.Color((data.r||0)/255, (data.g||0)/255, (data.b||0)/255);
  const intensity = (data.intensity||0) / 255;

  let beam = null, spot = null, spotTarget = null, floorSpot = null;

  if (model.isSpider) {
    // Spider: pro Bar 4 schmale Beams in der FIXFARBE der jeweiligen LED, die
    // dem Tilt der Bar folgen. Kein Yoke/Pan, kein zentraler Spotlight/Floor-
    // Spot — jede LED strahlt einzeln (Scheren-Look ueber die zwei Bars).
    const beamLength = 6.5;
    const beamAngle = Math.PI / 20;
    model.bars.forEach(bar => {
      bar.beams = [];
      bar.lenses.forEach(lens => {
        const host = new THREE.Group();
        host.position.copy(lens.position);
        const bcone = createBeamCone(lens.userData.ledColor.clone(), 0, beamAngle, beamLength);
        host.add(bcone);
        bar.pivot.add(host);
        bar.beams.push(bcone);
      });
    });
  } else if (rtype === 'smoke' || rtype === 'hazer') {
    // Nebel/Hazer sind KEINE Licht-Fixtures -> kein Beam/SpotLight/Floor-Spot
    // (nur der emissive Indikator-Lamp aus dem build); vorher bekamen sie
    // faelschlich einen Lichtkegel + schattenwerfenden SpotLight.
  } else {
    const headHost = model.head || model.group;
    const beamLength = rtype === 'led_bar' ? 6.0 : 8.0;
    const beamAngle = rtype === 'led_bar' ? Math.PI/14 : Math.PI/10;
    beam = createBeamCone(color, intensity, beamAngle, beamLength);
    headHost.add(beam);

    spot = new THREE.SpotLight(color, intensity * 3.0, 25, beamAngle * 1.2, 0.6, 1.0);
    spot.castShadow = true;
    spot.shadow.mapSize.width = 512;
    spot.shadow.mapSize.height = 512;
    root.add(spot);

    spotTarget = new THREE.Object3D();
    spotTarget.position.set(0, -root.position.y, 0);
    scene.add(spotTarget);
    spot.target = spotTarget;

    floorSpot = createFloorSpot(color, intensity, 1.2);
    scene.add(floorSpot);
  }

  scene.add(root);

  // 2D top-down icon
  const icon = buildTopDownIcon(rtype);
  icon.position.set(root.position.x, 0.05, root.position.z);
  icon.userData.fid = Number(fid);
  // Force pickable: tag children
  icon.traverse(o => { if (o.isMesh) o.userData.fid = Number(fid); });
  icon.visible = (viewMode === '2D');
  scene.add(icon);
  topDownIcons[fid] = icon;

  // Hide 3D model in 2D mode
  root.visible = (viewMode === '3D');

  fixtures[fid] = {
    group: root,
    yoke: model.yoke || null,
    head: model.head || null,
    lens: model.lens || null,
    lamp: model.lamp || null,
    laserBeams: model.laserBeams || null,
    bars: model.bars || null,
    isSpider: !!model.isSpider,
    beam, spot, spotTarget, floorSpot,
    icon,
    type: rtype,
    dockedTo: data.dockedTo || null,
    // Pan/Tilt physischer Bereich (Grad) + Nullpunkt -> Beam-Abbildung = Hardware.
    panRange: (data.panRange != null) ? data.panRange : 360,
    tiltRange: (data.tiltRange != null) ? data.tiltRange : 180,
    panZero: (data.panZero != null) ? data.panZero : 128,
    tiltZero: (data.tiltZero != null) ? data.tiltZero : 128,
    data: { ...data },
  };

  rebuildFixtureMeshList();
  updateFixture(fid, data.r||0, data.g||0, data.b||0, data.intensity||0, data.pan||128, data.tilt||128, data.heads||null);
}

function removeFixture(fid) {
  const f = fixtures[fid];
  if (!f) return;
  scene.remove(f.group);
  if (f.spotTarget) scene.remove(f.spotTarget);
  if (f.floorSpot) { scene.remove(f.floorSpot); disposeObj(f.floorSpot); }
  if (f.icon) { scene.remove(f.icon); f.icon.traverse(disposeObj); }
  f.group.traverse(disposeObj);
  delete fixtures[fid];
  delete topDownIcons[fid];
  // Clean selection
  const idx = selectedFids.indexOf(Number(fid));
  if (idx >= 0) selectedFids.splice(idx, 1);
  rebuildFixtureMeshList();
  updateOutlines();
}

function updateFixture(fid, r, g, b, intensity, pan, tilt, heads) {
  const f = fixtures[fid];
  if (!f) return;
  const color = new THREE.Color(r/255, g/255, b/255);
  const intNorm = intensity / 255;
  const skipBeam = (viewMode === '2D' && Object.keys(fixtures).length > 50);

  if (heads) f.lastHeads = heads;

  // ── Spider: zwei parallele Bars, je 4 EINZELFARBEN-LEDs ────────────────────
  // Jede LED leuchtet einzeln nach ihrem eigenen Kanal (cr/cg/cb/cw der Bar);
  // Master-Dimmer (intensity) ist gemeinsam. Tilt je Bar -> Scheren-Look.
  if (f.isSpider && f.bars) {
    const hs = f.lastHeads || [];
    for (let i = 0; i < f.bars.length; i++) {
      const bar = f.bars[i];
      const h = hs[i] || hs[0] || {};
      const chan = [h.cr || 0, h.cg || 0, h.cb || 0, h.cw || 0];  // [r,g,b,w]-Kanalwerte
      // Tilt ueber den physischen Bereich des Geraets (wie der Moving-Head-Pfad),
      // statt fix 128/±90°; Default 180 ergibt PI/2 wie zuvor.
      const tHalf = (f.tiltRange || 180) * Math.PI / 360;
      const tZero = (f.tiltZero == null) ? 128 : f.tiltZero;
      const tRad = (((h.tilt == null ? tZero : h.tilt) - tZero) / 128) * tHalf;
      bar.pivot.rotation.x = tRad;
      for (let k = 0; k < bar.lenses.length; k++) {
        const lens = bar.lenses[k];
        const ledVal = (chan[lens.userData.ch] || 0) / 255;   // dieser LED-Kanal
        const bright = ledVal * intNorm;                       // * Master-Dimmer
        if (lens.material) {
          lens.material.emissive = lens.userData.ledColor;
          lens.material.emissiveIntensity = bright * 1.9;
        }
        const bm = bar.beams[k];
        if (bm) {
          bm.material.color = lens.userData.ledColor;
          bm.material.opacity = Math.max(0.0, bright * settings.beamOpacity);
          bm.visible = settings.showCones && bright > 0.01 && viewMode === '3D';
        }
      }
    }
    // Top-Down-Icon: Farbe der linken Bar (Kopf 0) spiegeln
    if (f.icon && f.icon.userData.body && f.icon.userData.body.material) {
      const h0 = (f.lastHeads && f.lastHeads[0]) || { r, g, b };
      if (intNorm > 0.05) {
        f.icon.userData.body.material.color.setRGB((h0.r||0)/255, (h0.g||0)/255, (h0.b||0)/255);
        f.icon.userData.body.material.opacity = Math.min(1.0, 0.5 + intNorm * 0.5);
      } else {
        f.icon.userData.body.material.color.setHex(0x3a3a4a);
        f.icon.userData.body.material.opacity = 0.85;
      }
    }
    if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
    return;   // Spider fertig — generische Single-Head-Logik ueberspringen
  }

  if (f.beam) {
    f.beam.material.color = color;
    f.beam.material.opacity = Math.max(0.0, intNorm * settings.beamOpacity);
    f.beam.visible = settings.showCones && intNorm > 0.01 && viewMode === '3D';
  }
  if (f.spot) {
    f.spot.color = color;
    f.spot.intensity = intNorm * 3.0;
  }
  if (f.floorSpot) {
    f.floorSpot.material.color = color;
    f.floorSpot.material.opacity = Math.max(0.0, intNorm * 0.55);
    f.floorSpot.visible = settings.showFloorSpots && intNorm > 0.01;
  }
  if (f.lens && f.lens.material) {
    f.lens.material.emissive = color;
    f.lens.material.emissiveIntensity = intNorm * 1.5;
  }
  if (f.lamp && f.lamp.material) {
    f.lamp.material.emissive = color;
    f.lamp.material.emissiveIntensity = intNorm * 1.5;
  }
  // Laser-Faecher: jede Linie folgt DMX-Farbe + Intensitaet (statt fix gruen/an)
  if (f.laserBeams) {
    const laserVis = settings.showCones && intNorm > 0.01 && viewMode === '3D';
    for (const bm of f.laserBeams) {
      if (!bm.material) continue;
      bm.material.color = color;
      bm.material.opacity = Math.max(0.0, intNorm * 0.6);
      bm.visible = laserVis;
    }
  }
  // Top-down icon color reflects active output color (only when bright)
  if (f.icon && f.icon.userData.body && f.icon.userData.body.material) {
    if (intNorm > 0.05) {
      f.icon.userData.body.material.color.copy(color);
      f.icon.userData.body.material.opacity = Math.min(1.0, 0.5 + intNorm * 0.5);
    } else {
      f.icon.userData.body.material.color.setHex(0x3a3a4a);
      f.icon.userData.body.material.opacity = 0.85;
    }
  }

  // Pan/Tilt
  if (f.type === 'moving_head' && f.yoke && f.head) {
    // Pan/Tilt-DMX -> Winkel ueber den physischen Bereich des Geraets (halber
    // Bereich in Radiant = bereich*PI/360); Default 360/180 = generisch wie zuvor.
    const panHalf = (f.panRange || 360) * Math.PI / 360;
    const tiltHalf = (f.tiltRange || 180) * Math.PI / 360;
    const pZero = (f.panZero == null) ? 128 : f.panZero;
    const tZero = (f.tiltZero == null) ? 128 : f.tiltZero;
    const panRad = ((pan - pZero) / 128) * panHalf;
    const tiltRad = ((tilt - tZero) / 128) * tiltHalf;
    f.yoke.rotation.y = panRad;
    f.head.rotation.x = tiltRad;
    // Reflect pan in top-down icon (rotate the whole icon)
    if (f.icon) f.icon.rotation.y = panRad + f.group.rotation.y;
  }

  // Floor spot follow direction
  if (!skipBeam && f.floorSpot && f.spotTarget) {
    const dir = new THREE.Vector3(0, -1, 0);
    if (f.type === 'moving_head') {
      f.head.updateMatrixWorld();
      const wq = new THREE.Quaternion();
      f.head.getWorldQuaternion(wq);
      dir.applyQuaternion(wq);
    }
    const origin = new THREE.Vector3();
    f.group.getWorldPosition(origin);
    if (Math.abs(dir.y) > 0.001) {
      const t = -origin.y / dir.y;
      if (t > 0 && t < 100) {
        const hitX = origin.x + dir.x * t;
        const hitZ = origin.z + dir.z * t;
        f.floorSpot.position.set(hitX, 0.01, hitZ);
        f.spotTarget.position.set(hitX, 0.0, hitZ);
      }
    }
  }
  // Keep top-down icon position synced
  if (f.icon) {
    f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
  }
}

// ============================================================================
// View mode 2D / 3D
// ============================================================================
function setViewMode(mode) {
  viewMode = (mode === '2D') ? '2D' : '3D';
  activeCam = (viewMode === '2D') ? orthoCam : perspectiveCam;
  document.getElementById('mode-text').textContent = (viewMode === '2D') ? '2D Top View' : '3D View';
  document.getElementById('ruler-info').style.display = (viewMode === '2D') ? 'block' : 'none';
  // Toggle fixtures visibility
  for (const fid in fixtures) {
    const f = fixtures[fid];
    f.group.visible = (viewMode === '3D');
    if (f.icon) f.icon.visible = (viewMode === '2D');
    // Hide beam cones in 2D
    if (f.beam) f.beam.visible = (viewMode === '3D') && settings.showCones && f.beam.material.opacity > 0.01;
  }
  // Hide preset 3D scenery in 2D top-down to reduce clutter
  presetObjects.forEach(o => {
    if (o.userData && o.userData.isFloor) return;
    o.visible = (viewMode === '3D');
  });
  if (floorMesh) floorMesh.visible = true;
  // 2D-OCCLUSION-FIX: User-Buehnenobjekte im 2D halbtransparent (durchscheinend),
  // im 3D wieder voll — sonst verdecken Boden/Plattformen die Fixture-Icons.
  for (const id in stageObjects) applyStageObject2DStyle(id, viewMode === '2D');
  // Resize ortho on mode switch (preserve aspect)
  resizeOrtho();
  // Resize-Handles neu generieren (Groesse haengt vom Viewmode ab)
  updateResizeHandles();
}

let _userBrightnessOverride = null;  // wenn Slider manuell gesetzt

function setEditMode(mode) {
  editMode = mode || 'view';
  const banner = document.getElementById('mode-banner');
  if (editMode === 'edit') {
    banner.textContent = 'FIXTURE EDIT – Ziehen=Bewegen | Rechtsklick/Lang-Drücken=Platzieren | 📌 Taste unten rechts';
    banner.style.display = 'block';
  } else if (editMode === 'stage') {
    banner.textContent = 'BÜHNE BEARBEITEN – Tippen=Auswählen | Ziehen=Verschieben | ↻ / 🗑 unten rechts';
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
  updateFABs();
  // Edit-Werkzeug-Leiste nur im Fixture-Edit-Modus zeigen.
  const etb = document.getElementById('edit-toolbar');
  if (etb) etb.style.display = (editMode === 'edit') ? 'flex' : 'none';
  if (editMode === 'edit') {
    setEditTool(editTool);
  } else if (bridge && bridge.stopTrace) {
    try { bridge.stopTrace(); } catch (e) {}   // Nachfahren beim Modus-Verlassen stoppen
  }
  // Auto-Brightness: edit/stage modes brighten the scene for visibility
  if (settings.autoBrightness && _userBrightnessOverride === null) {
    if (editMode === 'edit' || editMode === 'stage') {
      applyBrightness(0.65);
    } else {
      applyBrightness(0.20);
    }
    // Inform Python so UI slider reflects current value
    if (typeof bridge !== 'undefined' && bridge && bridge.brightnessChanged) {
      try { bridge.brightnessChanged(settings.brightness); } catch (e) {}
    }
  }
  // Clear selection on mode change
  selectedFids = [];
  selectedStageId = null;
  updateOutlines();
}

// Edit-Werkzeug umschalten (von den Buttons oben). Aktualisiert Highlight +
// Hinweis-Banner. Wirkt nur im Fixture-Edit-Modus.
function setEditTool(tool) {
  editTool = ['move_xz', 'move_y', 'rotate', 'aim', 'trace'].includes(tool) ? tool : 'move_xz';
  // Beim Wechsel WEG vom Trace-Werkzeug ein laufendes Nachfahren stoppen.
  if (editTool !== 'trace' && bridge && bridge.stopTrace) {
    try { bridge.stopTrace(); } catch (e) {}
  }
  const map = [['tool-move-xz','move_xz'], ['tool-move-y','move_y'],
               ['tool-rotate','rotate'], ['tool-aim','aim'], ['tool-trace','trace']];
  for (const [id, t] of map) {
    const b = document.getElementById(id);
    if (b) b.classList.toggle('active', t === editTool);
  }
  const tp = document.getElementById('trace-panel');
  if (tp) tp.style.display = (editMode === 'edit' && editTool === 'trace') ? 'flex' : 'none';
  const banner = document.getElementById('mode-banner');
  if (editMode === 'edit' && banner) {
    banner.style.display = 'block';
    banner.textContent =
      editTool === 'move_xz' ? 'VERSCHIEBEN – Strahler ziehen (X/Z am Boden) · Tipp = auswählen'
      : editTool === 'move_y' ? 'HÖHE – hoch/runter ziehen ändert die Höhe (Y)'
      : editTool === 'rotate' ? 'DREHEN – seitlich ziehen = drehen (Hochachse) · hoch/runter = kippen'
      : editTool === 'aim' ? 'ZIELEN – Gerät antippen = auswählen · Boden/Wand antippen → ausrichten (MH fahren Pan/Tilt)'
      : 'NACHFAHREN – Moving Heads auswählen, dann Boden/Wand antippen → fahren dort eine Form ab (Tool wechseln = Stopp)';
  }
}

// ── Trace-Einstellungen (Form / Größe / Tempo / Speichern) ───────────────────
let traceShape = 'circle';      // 'circle' | 'line' | 'rect'
let traceRadius = 1.0;          // Meter
let traceIntervalMs = 60;       // Tempo (ms je Punkt)
let lastTraceTarget = null;     // {x,y,z,nx,ny,nz} vom letzten Tipp

function setTraceShape(s) {
  traceShape = (s === 'line' || s === 'rect') ? s : 'circle';
  for (const [id, sh] of [['tp-circle','circle'], ['tp-line','line'], ['tp-rect','rect']]) {
    const b = document.getElementById(id);
    if (b) b.classList.toggle('active', sh === traceShape);
  }
  restartTraceIfActive();
}
function onTraceRadius(v) {
  traceRadius = Math.max(0.2, Number(v) / 10);
  const el = document.getElementById('trace-radius-val');
  if (el) el.textContent = traceRadius.toFixed(1) + ' m';
  restartTraceIfActive();
}
function onTraceSpeed(v) {
  traceIntervalMs = Math.max(20, parseInt(v, 10));
  const el = document.getElementById('trace-speed-val');
  if (el) el.textContent = traceIntervalMs + ' ms';
  restartTraceIfActive();
}
function _traceSpec() {
  if (!lastTraceTarget) return null;
  return Object.assign({
    shape: traceShape, radius: traceRadius, count: 48,
    intervalMs: traceIntervalMs, fids: selectedFids.slice(),
  }, lastTraceTarget);
}
function restartTraceIfActive() {
  if (editTool === 'trace' && lastTraceTarget && selectedFids.length > 0 &&
      bridge && bridge.startTrace) {
    try { bridge.startTrace(JSON.stringify(_traceSpec())); } catch (e) {}
  }
}
function saveTraceSeq() {
  const spec = _traceSpec();
  if (!spec || selectedFids.length === 0) {
    showEditReadout('Erst Moving Heads wählen + eine Fläche antippen, dann speichern.');
    return;
  }
  if (bridge && bridge.saveTraceSequence) {
    try { bridge.saveTraceSequence(JSON.stringify(spec)); } catch (e) {}
  }
}

// Transientes Mess-/Wert-Readout während eines Edit-Drags (oben rechts).
function showEditReadout(text) {
  const ri = document.getElementById('ruler-info');
  if (!ri) return;
  ri.textContent = text;
  ri.style.display = 'block';
}
function hideEditReadout() {
  if (viewMode === '3D') {
    const ri = document.getElementById('ruler-info');
    if (ri) ri.style.display = 'none';
  }
}

// Mess-Anzeige: bei genau ZWEI ausgewaehlten Fixtures den Abstand (Meter) zeigen.
// (Grundlage fuers exakte Ausmessen — z.B. wie weit zwei Moving Heads stehen.)
function updateMeasureReadout() {
  const ri = document.getElementById('ruler-info');
  if (!ri) return;
  if (editMode === 'edit' && selectedFids.length === 2 &&
      fixtures[selectedFids[0]] && fixtures[selectedFids[1]]) {
    const a = fixtures[selectedFids[0]].group.position;
    const b = fixtures[selectedFids[1]].group.position;
    const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
    ri.textContent = '📏 Abstand: ' + d.toFixed(2) + ' m  (Δx ' + Math.abs(dx).toFixed(2) +
                     ' · Δy ' + Math.abs(dy).toFixed(2) + ' · Δz ' + Math.abs(dz).toFixed(2) + ')';
    ri.style.display = 'block';
  } else if (viewMode === '3D') {
    ri.style.display = 'none';
  }
}

// Direkter Slider-Setter (von Python aufgerufen) - markiert User-Override
function setBrightnessManual(b) {
  _userBrightnessOverride = b;
  applyBrightness(b);
}

// Reset auto-brightness (User klickt "Auto")
function resetBrightnessAuto() {
  _userBrightnessOverride = null;
  // Trigger current edit mode brightness
  setEditMode(editMode);
}

function resizeOrtho() {
  const a = window.innerWidth / window.innerHeight;
  orthoCam.left = -orthoSize * a;
  orthoCam.right = orthoSize * a;
  orthoCam.top = orthoSize;
  orthoCam.bottom = -orthoSize;
  orthoCam.updateProjectionMatrix();
}

// ============================================================================
// Selection / outlines
// ============================================================================
let selectedFids = []; // fid numbers
let selectedStageId = null;

// Apply an emissive RGB (0..1) to a mesh or all child meshes of a Group.
function applyStageEmissive(target, r, g, b) {
  if (!target) return;
  if (target.isMesh) {
    if (target.material && target.material.emissive) {
      target.material.emissive.setRGB(r, g, b);
    }
  } else if (target.isGroup || target.children) {
    target.traverse(c => {
      if (c.isMesh && c.material && c.material.emissive) {
        c.material.emissive.setRGB(r, g, b);
      }
    });
  }
}

function updateOutlines() {
  // Fixture outlines: tint icon ring in 2D, otherwise fall back to a wireframe-like hue
  for (const fid in fixtures) {
    const f = fixtures[fid];
    const sel = selectedFids.includes(Number(fid));
    if (f.icon && f.icon.userData.ring && f.icon.userData.ring.material) {
      f.icon.userData.ring.material.opacity = sel ? 1.0 : 0.0;
    }
    // 3D selection: brighten lens emissive a bit when no DMX intensity
    if (f.lens && f.lens.material) {
      if (sel) {
        // ensure visible cue
        if (!f._selBorder) {
          const geo = new THREE.RingGeometry(0.4, 0.55, 24);
          const mat = new THREE.MeshBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
          const ring = new THREE.Mesh(geo, mat);
          ring.rotation.x = -Math.PI / 2;
          ring.position.y = -0.5;
          f.group.add(ring);
          f._selBorder = ring;
        }
        f._selBorder.visible = true;
      } else if (f._selBorder) {
        f._selBorder.visible = false;
      }
    }
  }
  // Stage object highlight: selektiertes Element gelb (sehr auffaellig), andere unmarkiert
  for (const id in stageObjects) {
    const so = stageObjects[id];
    if (id === selectedStageId) {
      // BoxHelper in hellgelb mit dicker Linie
      if (!so._helper) {
        so._helper = new THREE.BoxHelper(so.mesh, 0xffd700);
        if (so._helper.material) {
          so._helper.material.linewidth = 4;
          so._helper.material.depthTest = false;
          so._helper.material.transparent = true;
          so._helper.material.opacity = 1.0;
        }
        scene.add(so._helper);
      } else {
        so._helper.material.color.setHex(0xffd700);
        so._helper.material.opacity = 1.0;
      }
      so._helper.update();
      so._helper.visible = true;
      // Labels ueber Elementen wurden auf Wunsch entfernt (stoeren) - nichts tun
      // Emissive-Boost als Start-Wert (animate() pulsiert weiter)
      applyStageEmissive(so.mesh, 0.4, 0.25, 0.0);
    } else {
      if (so._helper) so._helper.visible = false;
      // Emissive zuruecksetzen
      applyStageEmissive(so.mesh, 0, 0, 0);
    }
  }
  // Resize-Handles neu aufbauen (nur sichtbar wenn editMode == 'stage' + Selektion)
  updateResizeHandles();
  // Top-Banner: zeige welche Art von Element selektiert ist
  const sb = document.getElementById('selection-banner');
  const sbt = document.getElementById('selection-banner-text');
  if (sb && sbt) {
    if (selectedStageId && stageObjects[selectedStageId]) {
      const so = stageObjects[selectedStageId];
      const typeLabels = {
        floor: 'BODEN',
        platform: 'PLATTFORM', truss_h: 'TRASSE (horizontal)', truss_v: 'TRASSE (vertikal)',
        wall: 'WAND', led_wall: 'LED-WAND', speaker: 'LAUTSPRECHER',
        audience: 'PUBLIKUM', dj_booth: 'DJ-BOOTH'
      };
      const nm = so.data.name || '';
      const tp = typeLabels[so.data.type] || String(so.data.type || '').toUpperCase();
      sbt.textContent = nm ? (tp + ' - ' + nm) : tp;
      sb.style.display = 'block';
    } else if (selectedFids.length > 0) {
      sbt.textContent = 'FIXTURE x' + selectedFids.length;
      sb.style.display = 'block';
    } else {
      sb.style.display = 'none';
    }
  }
  // Notify python of selection
  if (bridge && bridge.fixtureSelectionChanged) {
    try { bridge.fixtureSelectionChanged(JSON.stringify(selectedFids)); } catch (e) {}
  }
  if (bridge && bridge.stageSelectionChanged) {
    try { bridge.stageSelectionChanged(selectedStageId || ''); } catch (e) {}
  }
  updateFABs();
}

// ============================================================================
// Pointer / drag / select
// ============================================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let isLeftDragging = false;
let dragMode = 'none';  // 'rotate' | 'pan' | 'fixtureDrag' | 'stageDrag' | 'marquee' | 'none'
let lastMouseX = 0, lastMouseY = 0;
let downMouseX = 0, downMouseY = 0;
let mouseMovedDuringClick = false;

let dragStartPositions = {}; // fid -> {x, z}
let dragStartStagePos = null; // for stage drag
let dragGroundOffset = new THREE.Vector3();

function setMouseFromCoords(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
}

function setMouseFromEvent(e) {
  setMouseFromCoords(e.clientX, e.clientY);
}

function intersectGround() {
  raycaster.setFromCamera(mouse, activeCam);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const out = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, out);
  return out;
}

function pickFixture() {
  raycaster.setFromCamera(mouse, activeCam);
  // For 2D mode prefer the top-down icons (their body meshes are in fixtureMeshes? No, we rebuild only on add/remove - icons aren't in that list. Build dynamic list here.)
  const meshes = [];
  if (viewMode === '2D') {
    for (const fid in topDownIcons) {
      topDownIcons[fid].traverse(o => { if (o.isMesh) { o.userData.fid = Number(fid); meshes.push(o); } });
    }
  } else {
    for (const fid in fixtures) {
      fixtures[fid].group.traverse(o => { if (o.isMesh) { o.userData.fid = Number(fid); meshes.push(o); } });
    }
  }
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length > 0) return hits[0].object.userData.fid;
  return null;
}

function pickStageObject() {
  raycaster.setFromCamera(mouse, activeCam);
  const meshes = Object.values(stageObjects).map(s => s.mesh);
  // recursive=true: Truss-Gruppen tragen ihre Geometrie in Kind-Meshes.
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length > 0) {
    const sid = _stageIdFromObject(hits[0].object);
    if (sid) return sid;
  }
  // Touch-Fallback: naechstes Element-Zentrum innerhalb Bildschirm-Toleranz,
  // damit duenne Trassen auch per Finger antippbar sind.
  return _pickStageObjectNear(48);
}

function _pickStageObjectNear(tolPx) {
  const rect = renderer.domElement.getBoundingClientRect();
  const mx = (mouse.x + 1) / 2 * rect.width;
  const my = (1 - mouse.y) / 2 * rect.height;
  let best = null, bestD = tolPx;
  const v = new THREE.Vector3();
  for (const id in stageObjects) {
    const so = stageObjects[id];
    v.set(so.data.position.x, so.data.position.y, so.data.position.z).project(activeCam);
    if (v.z > 1) continue;  // hinter der Kamera
    const sx = (v.x + 1) / 2 * rect.width;
    const sy = (1 - v.y) / 2 * rect.height;
    const d = Math.hypot(sx - mx, sy - my);
    if (d < bestD) { bestD = d; best = id; }
  }
  return best;
}

function snap(v) {
  if (!settings.snapToGrid) return v;
  return Math.round(v / settings.gridStep) * settings.gridStep;
}

// ============================================================================
// Andocken (opt-in): Strahler rasten an Buehnen-Elemente ein.
//   Trasse  -> Strahler haengt unten dran ('hang')
//   Boden/Plattform/... -> Strahler steht oben drauf ('top')
// Spiegelt StageDefinition.dock_target_for() in stage_definition.py.
// ============================================================================
const DOCK_HANG_TYPES = { truss_h: 1, truss_v: 1 };
const DOCK_TOP_TYPES  = { platform: 1, floor: 1, dj_booth: 1, speaker: 1, audience: 1 };
const DOCK_HANG_OFFSET = 0.25;
const DOCK_TOP_OFFSET  = 0.30;
const _dockRay = new THREE.Raycaster();
let _dockHighlightId = null;

function _stageIdFromObject(obj) {
  let o = obj;
  while (o) {
    if (o.userData && o.userData.stageId) return o.userData.stageId;
    o = o.parent;
  }
  return null;
}

// Liefert {stageId, y, kind} fuer das oberste andockbare Element ueber (x,z) oder null.
function findDockTarget(x, z) {
  const meshes = [];
  for (const id in stageObjects) meshes.push(stageObjects[id].mesh);
  if (meshes.length === 0) return null;
  _dockRay.set(new THREE.Vector3(x, 200, z), new THREE.Vector3(0, -1, 0));
  _dockRay.near = 0; _dockRay.far = 500;
  const hits = _dockRay.intersectObjects(meshes, true);
  for (const h of hits) {
    const sid = _stageIdFromObject(h.object);
    if (!sid) continue;
    const so = stageObjects[sid];
    if (!so) continue;
    const t = so.data.type;
    const sy = so.data.size.y || 0.1;
    if (DOCK_HANG_TYPES[t]) {
      return { stageId: sid, y: so.data.position.y - sy / 2 - DOCK_HANG_OFFSET, kind: 'hang' };
    }
    if (DOCK_TOP_TYPES[t]) {
      return { stageId: sid, y: so.data.position.y + sy / 2 + DOCK_TOP_OFFSET, kind: 'top' };
    }
    // wall / led_wall: ignorieren, naechsten (tieferen) Treffer pruefen
  }
  return null;
}

function applyDockHighlight(sid) {
  if (_dockHighlightId === sid) return;
  clearDockHighlight();
  const so = stageObjects[sid];
  if (so) { applyStageEmissive(so.mesh, 0.0, 0.55, 0.18); _dockHighlightId = sid; }
}

function clearDockHighlight() {
  if (_dockHighlightId && stageObjects[_dockHighlightId] &&
      _dockHighlightId !== selectedStageId) {
    applyStageEmissive(stageObjects[_dockHighlightId].mesh, 0, 0, 0);
  }
  _dockHighlightId = null;
}

function showDockBadge(text) {
  const b = document.getElementById('dock-badge');
  const t = document.getElementById('dock-badge-text');
  if (b && t) { t.textContent = text; b.style.display = 'block'; }
}
function hideDockBadge() {
  const b = document.getElementById('dock-badge');
  if (b) b.style.display = 'none';
}

function _dockNameFor(sid) {
  const so = stageObjects[sid];
  if (!so) return sid;
  return so.data.name || so.data.type || sid;
}

// Verschiebt alle an `sid` angedockten Strahler mit (XZ-Delta) und setzt ihre
// Hoehe neu. Wird aufgerufen, wenn ein Buehnen-Element bewegt/skaliert wird.
function moveDockedFixtures(sid, dxw, dzw) {
  for (const fid in fixtures) {
    const f = fixtures[fid];
    if (!f || f.dockedTo !== sid) continue;
    f.group.position.x += dxw;
    f.group.position.z += dzw;
    const dock = findDockTarget(f.group.position.x, f.group.position.z);
    if (dock && dock.stageId === sid) {
      f.group.position.y = dock.y;
    }
    if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
    if (f.spotTarget) f.spotTarget.position.set(f.group.position.x, 0.0, f.group.position.z);
  }
}

function _reportDockedFixturePositions(sid) {
  for (const fid in fixtures) {
    const f = fixtures[fid];
    if (!f || f.dockedTo !== sid) continue;
    if (bridge && bridge.fixturePositionChanged) {
      try {
        bridge.fixturePositionChanged(String(fid),
          f.group.position.x, f.group.position.y, f.group.position.z);
      } catch (e) {}
    }
  }
}

function _placeFixtureAtMouse() {
  raycaster.setFromCamera(mouse, activeCam);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0), -0.4), target);
  if (bridge && target && bridge.placeFixture) {
    const px = snap(target.x), pz = snap(target.z);
    _fabLastPlaceCoords = { x: target.x, z: target.z };
    let y = 6.5, dock = '';
    if (settings.dockEnabled) {
      const dt = findDockTarget(px, pz);
      if (dt) { y = dt.y; dock = dt.stageId; }
    }
    bridge.placeFixture(JSON.stringify({ x: px, y: y, z: pz, dock: dock }));
  }
}

renderer.domElement.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  setMouseFromEvent(e);
  _placeFixtureAtMouse();
}, false);

// Shared pointer logic (called by both mouse and touch handlers)
function handlePointerDown(clientX, clientY, shiftKey) {
  setMouseFromCoords(clientX, clientY);
  isLeftDragging = true;
  downMouseX = clientX; downMouseY = clientY;
  lastMouseX = clientX; lastMouseY = clientY;
  mouseMovedDuringClick = false;

  if (editMode === 'edit') {
    if (editTool === 'aim' || editTool === 'trace') {
      // 1-Finger-Drag = Kamera drehen/schwenken; ein Tipp (ohne Bewegung) zielt
      // bzw. startet das Nachfahren (in handlePointerUp). Kein Fixture-Drag/Marquee.
      dragMode = (viewMode === '3D') ? 'rotate' : 'pan';
      return;
    }
    const fid = pickFixture();
    if (fid != null) {
      const additive = shiftKey;
      if (!additive && !selectedFids.includes(fid)) {
        selectedFids = [fid];
      } else if (additive) {
        if (!selectedFids.includes(fid)) selectedFids.push(fid);
      }
      dragStartPositions = {};
      for (const sf of selectedFids) {
        if (fixtures[sf]) {
          const g = fixtures[sf].group;
          dragStartPositions[sf] = {
            x: g.position.x,
            y: g.position.y,
            z: g.position.z,
            rotXDeg: rad2deg(g.rotation.x),
            rotYDeg: rad2deg(g.rotation.y),
          };
        }
      }
      const groundHit = intersectGround();
      const refF = fixtures[fid];
      if (groundHit && refF) {
        dragGroundOffset.set(groundHit.x - refF.group.position.x, 0, groundHit.z - refF.group.position.z);
        dragGroundOffset.userData = { refFid: fid };
      }
      dragMode = 'fixtureDrag';
      updateOutlines();
      return;
    } else {
      // Marquee-Selektion (nur mit Maus; Touch springt direkt zu Kamera-Pan)
      dragMode = 'marquee';
      const m = document.getElementById('marquee');
      m.style.display = 'block';
      m.style.left = clientX + 'px';
      m.style.top = clientY + 'px';
      m.style.width = '0px';
      m.style.height = '0px';
      if (!shiftKey) { selectedFids = []; updateOutlines(); }
      return;
    }
  }

  if (editMode === 'stage') {
    if (selectedStageId && resizeHandles.length > 0) {
      const handle = pickResizeHandle();
      if (handle) {
        const so = stageObjects[selectedStageId];
        if (so) {
          dragResizeCorner = handle.userData.corner;
          const halfX = so.data.size.x / 2;
          const halfZ = so.data.size.z / 2;
          const cx = so.mesh.position.x;
          const cz = so.mesh.position.z;
          let fixedX, fixedZ;
          if (dragResizeCorner === 'nw') { fixedX = cx + halfX; fixedZ = cz + halfZ; }
          else if (dragResizeCorner === 'ne') { fixedX = cx - halfX; fixedZ = cz + halfZ; }
          else if (dragResizeCorner === 'sw') { fixedX = cx + halfX; fixedZ = cz - halfZ; }
          else                                { fixedX = cx - halfX; fixedZ = cz - halfZ; }
          dragResizeStart = {
            fixedX, fixedZ,
            startSizeX: so.data.size.x,
            startSizeZ: so.data.size.z,
          };
          dragMode = 'stageResize';
          return;
        }
      }
    }
    const sid = pickStageObject();
    if (sid != null) {
      selectedStageId = sid;
      const so = stageObjects[sid];
      const groundHit = intersectGround();
      if (groundHit) {
        dragStartStagePos = {
          startX: so.mesh.position.x,
          startZ: so.mesh.position.z,
          offsetX: groundHit.x - so.mesh.position.x,
          offsetZ: groundHit.z - so.mesh.position.z,
        };
      }
      dragMode = 'stageDrag';
      updateOutlines();
      return;
    } else {
      selectedStageId = null;
      updateOutlines();
    }
  }

  if (viewMode === '3D') {
    dragMode = 'rotate';
  } else {
    dragMode = 'pan';
  }
}

function handlePointerMove(clientX, clientY) {
  if (Math.abs(clientX - downMouseX) > 3 || Math.abs(clientY - downMouseY) > 3) {
    mouseMovedDuringClick = true;
  }
  if (viewMode === '2D') {
    setMouseFromCoords(clientX, clientY);
    const gh = intersectGround();
    if (gh) {
      document.getElementById('ruler-info').textContent =
        'X: ' + gh.x.toFixed(2) + ' m | Z: ' + gh.z.toFixed(2) + ' m | Grid: ' + (settings.snapToGrid ? 'ON' : 'OFF');
    }
  }
  if (!isLeftDragging) return;
  setMouseFromCoords(clientX, clientY);
  const dx = clientX - lastMouseX;
  const dy = clientY - lastMouseY;

  if (dragMode === 'rotate') {
    theta -= dx * 0.008;
    phi = Math.max(0.2, Math.min(Math.PI * 0.49, phi + dy * 0.008));
    updateCamera();
  } else if (dragMode === 'pan') {
    const a = window.innerWidth / window.innerHeight;
    const wPerPxX = (2 * orthoSize * a) / window.innerWidth;
    const wPerPxZ = (2 * orthoSize) / window.innerHeight;
    orthoCam.position.x -= dx * wPerPxX;
    orthoCam.position.z -= dy * wPerPxZ;
  } else if (dragMode === 'fixtureDrag') {
    if (editTool === 'move_y') {
      // HÖHE: vertikale Fingerbewegung -> Welt-Y (≈50 px = 1 m), je vom Start.
      const dY = -(clientY - downMouseY) * 0.02;
      for (const fid of selectedFids) {
        const start = dragStartPositions[fid];
        const f = fixtures[fid];
        if (start && f) {
          let ny = (start.y != null ? start.y : f.group.position.y) + dY;
          ny = Math.max(0, Math.min(30, ny));
          if (settings.snapToGrid) ny = Math.round(ny / settings.gridStep) * settings.gridStep;
          f.group.position.y = ny;
          f._pendingDock = null;   // manuelle Höhe löst Andocken
        }
      }
      const rf0 = fixtures[selectedFids[0]];
      if (rf0) showEditReadout('Höhe Y: ' + rf0.group.position.y.toFixed(2) + ' m');
    } else if (editTool === 'rotate') {
      // DREHEN: seitlich = Yaw (Hochachse Y), hoch/runter = Kippen (Pitch X). ~0.5°/px.
      const dYaw = (clientX - downMouseX) * 0.5;
      const dPitch = (clientY - downMouseY) * 0.5;
      for (const fid of selectedFids) {
        const start = dragStartPositions[fid];
        const f = fixtures[fid];
        if (start && f) {
          f.group.rotation.y = deg2rad(Math.round((start.rotYDeg || 0) + dYaw));
          f.group.rotation.x = deg2rad(Math.round((start.rotXDeg || 0) + dPitch));
          if (f.icon) f.icon.rotation.y = f.group.rotation.y;
        }
      }
      const rf1 = fixtures[selectedFids[0]];
      if (rf1) showEditReadout('Drehen Y: ' + Math.round(rad2deg(rf1.group.rotation.y)) +
                               '° · Kippen X: ' + Math.round(rad2deg(rf1.group.rotation.x)) + '°');
    } else {
    const gh = intersectGround();
    if (gh && dragGroundOffset.userData) {
      const refFid = dragGroundOffset.userData.refFid;
      const newX = gh.x - dragGroundOffset.x;
      const newZ = gh.z - dragGroundOffset.z;
      const refStart = dragStartPositions[refFid];
      if (refStart) {
        const dxw = snap(newX) - refStart.x;
        const dzw = snap(newZ) - refStart.z;
        let refDock = null;
        for (const fid of selectedFids) {
          const start = dragStartPositions[fid];
          const f = fixtures[fid];
          if (start && f) {
            f.group.position.x = start.x + dxw;
            f.group.position.z = start.z + dzw;
            if (settings.dockEnabled) {
              const dt = findDockTarget(f.group.position.x, f.group.position.z);
              f._pendingDock = dt ? dt.stageId : null;
              if (dt) f.group.position.y = dt.y;
              if (Number(fid) === Number(refFid)) refDock = dt;
            }
            if (f.icon) f.icon.position.set(f.group.position.x, 0.05, f.group.position.z);
          }
        }
        if (settings.dockEnabled) {
          if (refDock) {
            applyDockHighlight(refDock.stageId);
            showDockBadge((refDock.kind === 'hang' ? 'haengt an ' : 'steht auf ') + _dockNameFor(refDock.stageId));
          } else {
            clearDockHighlight();
            hideDockBadge();
          }
        }
      }
    }
    }
  } else if (dragMode === 'stageDrag' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    const gh = intersectGround();
    if (gh && so && dragStartStagePos) {
      const nx = snap(gh.x - dragStartStagePos.offsetX);
      const nz = snap(gh.z - dragStartStagePos.offsetZ);
      const dxw = nx - so.mesh.position.x;
      const dzw = nz - so.mesh.position.z;
      so.mesh.position.x = nx;
      so.mesh.position.z = nz;
      so.data.position.x = nx;
      so.data.position.z = nz;
      if (dxw || dzw) moveDockedFixtures(selectedStageId, dxw, dzw);
      if (so._helper) so._helper.update();
      updateResizeHandles();
    }
  } else if (dragMode === 'stageResize' && selectedStageId && dragResizeStart) {
    const so = stageObjects[selectedStageId];
    const gh = intersectGround();
    if (gh && so) {
      const fx = dragResizeStart.fixedX;
      const fz = dragResizeStart.fixedZ;
      const newGripX = snap(gh.x);
      const newGripZ = snap(gh.z);
      const newSizeX = Math.max(0.2, Math.abs(newGripX - fx));
      const newSizeZ = Math.max(0.2, Math.abs(newGripZ - fz));
      const newCX = (fx + newGripX) / 2;
      const newCZ = (fz + newGripZ) / 2;
      // Truss/Platform-Groups werden in updateStageObjectProps komplett neu
      // gebaut (dispose + Modell-Clone). Die GESNAPPTEN Werte aendern sich nur
      // beim Ueberqueren einer Rasterlinie -> nur dann neu aufbauen, statt pro
      // Mausbewegung (verhindert den GC-/Perf-Churn beim Resizen).
      if (newSizeX !== dragResizeStart.lastSizeX || newSizeZ !== dragResizeStart.lastSizeZ
          || newCX !== dragResizeStart.lastCX || newCZ !== dragResizeStart.lastCZ) {
        dragResizeStart.lastSizeX = newSizeX;
        dragResizeStart.lastSizeZ = newSizeZ;
        dragResizeStart.lastCX = newCX;
        dragResizeStart.lastCZ = newCZ;
        updateStageObjectProps(selectedStageId, {
          size: {x: newSizeX, z: newSizeZ},
          position: {x: newCX, z: newCZ},
        });
        moveDockedFixtures(selectedStageId, 0, 0);
        updateResizeHandles();
      }
      if (so._helper) so._helper.update();
    }
  } else if (dragMode === 'marquee') {
    const m = document.getElementById('marquee');
    const x1 = Math.min(downMouseX, clientX);
    const y1 = Math.min(downMouseY, clientY);
    const x2 = Math.max(downMouseX, clientX);
    const y2 = Math.max(downMouseY, clientY);
    m.style.left = x1 + 'px';
    m.style.top = y1 + 'px';
    m.style.width = (x2 - x1) + 'px';
    m.style.height = (y2 - y1) + 'px';
  }
  lastMouseX = clientX; lastMouseY = clientY;
}

function handlePointerUp(shiftKey) {
  if (!isLeftDragging) return;
  isLeftDragging = false;
  // ── Aim-Werkzeug: sauberer Tipp (kein Drag) ─────────────────────────────────
  if (editMode === 'edit' && (editTool === 'aim' || editTool === 'trace') && !mouseMovedDuringClick) {
    const fid = pickFixture();
    if (fid != null) {
      // Gerät antippen = auswählen (Mehrfach mit Shift)
      if (shiftKey) { if (!selectedFids.includes(fid)) selectedFids.push(fid); }
      else { selectedFids = [fid]; }
      updateOutlines();
      updateFABs();
      updateMeasureReadout();
      if (bridge && bridge.fixtureSelectionChanged) {
        try { bridge.fixtureSelectionChanged(JSON.stringify(selectedFids)); } catch (e) {}
      }
      dragMode = 'none';
      return;
    }
    // Keine Fixture getroffen -> Fläche (Boden/Wand/Plattform) anpeilen
    const pickable = floorMesh
      ? [floorMesh, ...Object.values(stageObjects).map(s => s.mesh)]
      : Object.values(stageObjects).map(s => s.mesh);
    raycaster.setFromCamera(mouse, activeCam);
    const hits = raycaster.intersectObjects(pickable, true);
    if (hits.length > 0 && selectedFids.length > 0) {
      const point = hits[0].point;
      let nx = 0, ny = 1, nz = 0;   // Welt-Normale (Default = nach oben)
      if (hits[0].face) {
        const ln = hits[0].face.normal;
        const obj = hits[0].object; obj.updateMatrixWorld(true);
        const e = obj.matrixWorld.elements;
        const wx = e[0]*ln.x + e[4]*ln.y + e[8]*ln.z;
        const wy = e[1]*ln.x + e[5]*ln.y + e[9]*ln.z;
        const wz = e[2]*ln.x + e[6]*ln.y + e[10]*ln.z;
        const L = Math.sqrt(wx*wx + wy*wy + wz*wz) || 1;
        nx = wx/L; ny = wy/L; nz = wz/L;
      }
      if (editTool === 'trace') {
        lastTraceTarget = { x: point.x, y: point.y, z: point.z, nx, ny, nz };
        if (bridge && bridge.startTrace) {
          try { bridge.startTrace(JSON.stringify(_traceSpec())); } catch (e) {}
        }
        const shp = traceShape === 'line' ? 'Linie' : (traceShape === 'rect' ? 'Rechteck' : 'Kreis');
        showEditReadout('○ Nachfahren: ' + shp + ' (' + traceRadius.toFixed(1) + ' m) um ' +
                        point.x.toFixed(1) + ' / ' + point.y.toFixed(1) + ' / ' + point.z.toFixed(1) + ' m');
      } else {
        if (bridge && bridge.aimFixturesAt) {
          try {
            bridge.aimFixturesAt(JSON.stringify({
              x: point.x, y: point.y, z: point.z, nx, ny, nz,
              fids: selectedFids.slice(),
            }));
          } catch (e) {}
        }
        showEditReadout('⌖ Ziel: ' + point.x.toFixed(2) + ' / ' +
                        point.y.toFixed(2) + ' / ' + point.z.toFixed(2) + ' m');
      }
    }
    dragMode = 'none';
    return;
  }
  if (dragMode === 'fixtureDrag') {
    for (const fid of selectedFids) {
      const f = fixtures[fid];
      if (!f) continue;
      // Andock-Beziehung festschreiben: bei aktivem Andocken aus der Vorschau,
      // bei freiem Ziehen (Andocken AUS) loest ein Drag eine bestehende Bindung.
      let newDock;
      if (settings.dockEnabled) {
        newDock = (f._pendingDock !== undefined) ? f._pendingDock : (f.dockedTo || null);
      } else {
        newDock = null;
      }
      if ((newDock || null) !== (f.dockedTo || null)) {
        f.dockedTo = newDock || null;
        if (bridge && bridge.fixtureDockChanged) {
          try { bridge.fixtureDockChanged(String(fid), f.dockedTo || ''); } catch (e) {}
        }
      }
      delete f._pendingDock;
      if (bridge && bridge.fixturePositionChanged) {
        try {
          bridge.fixturePositionChanged(
            String(fid),
            f.group.position.x,
            f.group.position.y,
            f.group.position.z
          );
        } catch (err) {}
      }
      // Beim Drehen-Werkzeug zusätzlich die neue Ausrichtung (GRAD) melden.
      if (editTool === 'rotate' && bridge && bridge.fixtureRotationChanged) {
        try {
          bridge.fixtureRotationChanged(
            String(fid),
            rad2deg(f.group.rotation.x),
            rad2deg(f.group.rotation.y),
            rad2deg(f.group.rotation.z)
          );
        } catch (err) {}
      }
    }
    clearDockHighlight();
    hideDockBadge();
    hideEditReadout();
  }
  if (dragMode === 'stageDrag' && selectedStageId) {
    const so = stageObjects[selectedStageId];
    if (so) {
      so.data.position.x = so.mesh.position.x;
      so.data.position.y = so.mesh.position.y;
      so.data.position.z = so.mesh.position.z;
    }
    _reportDockedFixturePositions(selectedStageId);
    notifyStageListChanged();
  }
  if (dragMode === 'stageResize' && selectedStageId) {
    _reportDockedFixturePositions(selectedStageId);
    notifyStageListChanged();
    updateResizeHandles();
    dragResizeCorner = null;
    dragResizeStart = null;
  }
  if (dragMode === 'marquee') {
    const m = document.getElementById('marquee');
    const rect = renderer.domElement.getBoundingClientRect();
    const x1 = parseInt(m.style.left, 10);
    const y1 = parseInt(m.style.top, 10);
    const w = parseInt(m.style.width, 10);
    const h = parseInt(m.style.height, 10);
    m.style.display = 'none';
    const newlySelected = [];
    for (const fid in fixtures) {
      const f = fixtures[fid];
      const pos = (viewMode === '2D' && f.icon) ? f.icon.position.clone() : f.group.position.clone();
      const screen = pos.project(activeCam);
      const sx = ((screen.x + 1) / 2) * rect.width + rect.left;
      const sy = ((1 - screen.y) / 2) * rect.height + rect.top;
      if (sx >= x1 && sx <= x1 + w && sy >= y1 && sy <= y1 + h) {
        newlySelected.push(Number(fid));
      }
    }
    if (shiftKey) {
      for (const fid of newlySelected) if (!selectedFids.includes(fid)) selectedFids.push(fid);
    } else {
      selectedFids = newlySelected;
    }
    updateOutlines();
  }
  dragMode = 'none';
  updateMeasureReadout();   // Abstand zeigen, wenn jetzt genau 2 ausgewählt sind
}
